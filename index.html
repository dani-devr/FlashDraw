<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flash Draw!</title>
    <!-- Gartic style chunky font -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg-light: #2196F3;
            --bg-dark: #0D47A1;
            --panel-bg: rgba(13, 71, 161, 0.4);
            --panel-border: rgba(255, 255, 255, 0.2);
            --ui-white: #ffffff;
            --ui-text: #2c3e50;
            --accent-pink: #FF4081;
            --btn-blue: #29B6F6;
            --btn-blue-dark: #0288D1;
            --btn-green: #00E676;
            --btn-green-dark: #00C853;
            --btn-red: #FF5252;
            --btn-red-dark: #D50000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Nunito', sans-serif; user-select: none; }
        
        body { 
            /* Blue Halftone Effect */
            background-color: var(--bg-light);
            background-image: radial-gradient(var(--bg-dark) 15%, transparent 16%), radial-gradient(var(--bg-dark) 15%, transparent 16%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            color: var(--ui-white);
            overflow: hidden; 
            height: 100vh; 
            width: 100vw; 
            display: flex; 
            flex-direction: column; 
        }
        
        /* Typography & Globals */
        h1, h2, h3 { text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 3px 0 rgba(0,0,0,0.2); }
        
        /* Gartic Style Buttons */
        .btn { 
            background: var(--btn-blue); color: white; border: none; padding: 12px 24px; border-radius: 12px; 
            font-size: 1.2rem; font-weight: 900; cursor: pointer; text-transform: uppercase;
            border-bottom: 6px solid var(--btn-blue-dark); transition: all 0.1s; text-shadow: 0 2px 0 rgba(0,0,0,0.2);
            display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%;
        }
        .btn:active { border-bottom-width: 0px; transform: translateY(6px); margin-bottom: 6px; }
        .btn.green { background: var(--btn-green); border-bottom-color: var(--btn-green-dark); }
        .btn.red { background: var(--btn-red); border-bottom-color: var(--btn-red-dark); }
        
        .input { 
            background: var(--ui-white); color: var(--ui-text); border: 4px solid var(--bg-dark); 
            padding: 12px 16px; border-radius: 12px; font-size: 1.2rem; font-weight: 800; outline: none; width: 100%; text-align: center;
        }
        .input::placeholder { color: #95a5a6; }

        /* Panels */
        .panel { 
            background: var(--panel-bg); border: 2px solid var(--panel-border); border-radius: 20px; 
            padding: 20px; backdrop-filter: blur(5px); box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .view { display: none; height: 100%; width: 100%; position: absolute; top: 0; left: 0; flex-direction: column; align-items: center; justify-content: center;}
        .view.active { display: flex; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }

        /* --- LOGIN & LOBBY --- */
        .logo { font-size: 4.5rem; color: white; -webkit-text-stroke: 2px var(--bg-dark); text-shadow: 4px 4px 0 var(--bg-dark); margin-bottom: 20px; text-align: center; }
        .center-box { max-width: 450px; width: 90%; text-align: center; }
        
        .lobby-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; max-width: 900px; width: 95%; height: 80vh; }
        .player-list { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; max-height: 50vh; margin-top: 15px;}
        .player-card { background: white; color: var(--ui-text); padding: 12px 15px; border-radius: 12px; border-bottom: 4px solid #ccc; display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 1.1rem;}
        .status-dot { height: 15px; width: 15px; border-radius: 50%; background: var(--btn-red); box-shadow: inset 0 -3px 0 rgba(0,0,0,0.2); }
        .status-dot.ready { background: var(--btn-green); }

        .settings-row { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .settings-row input[type=range] { width: 120px; accent-color: var(--accent-pink); }

        /* --- DRAWING INTERFACE --- */
        #view-draw { padding: 15px; justify-content: flex-start; }
        
        /* Top Bar */
        .draw-top { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1200px; margin-bottom: 10px; }
        .round-info { background: var(--bg-dark); padding: 8px 20px; border-radius: 20px; font-size: 1.2rem; border: 2px solid rgba(255,255,255,0.2); }
        .timer-circle { background: var(--bg-dark); border: 4px solid var(--accent-pink); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 900; box-shadow: 0 0 15px var(--accent-pink); }

        /* Main Drawing Area Grid */
        .draw-workspace { display: grid; grid-template-columns: 80px 1fr 80px; gap: 15px; width: 100%; max-width: 1200px; height: 80vh; }
        
        /* Left: Palette */
        .tool-panel { background: #b02a4b; /* Gartic red tint behind tools */ background: var(--panel-bg); border-radius: 15px; padding: 10px; display: flex; flex-direction: column; gap: 8px; border: 2px solid var(--panel-border); overflow-y: auto;}
        .palette-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .color-swatch { width: 100%; aspect-ratio: 1; border-radius: 8px; border: 3px solid rgba(0,0,0,0.2); cursor: pointer; transition: 0.1s; box-shadow: inset 0 -3px 0 rgba(0,0,0,0.2); }
        .color-swatch:active, .color-swatch.active { transform: scale(0.9); border-color: white; }

        /* Center: Notebook Canvas */
        .notebook-wrapper { display: flex; flex-direction: column; position: relative; }
        .notebook-header { background: #3c1e70; background: var(--bg-dark); color: var(--btn-green); border-radius: 15px 15px 0 0; text-align: center; padding: 15px; font-size: 1.5rem; text-transform: uppercase; font-weight: 900; z-index: 2; border: 4px solid #231145; border-bottom: none; }
        .notebook-canvas { background: white; flex: 1; border-radius: 0 0 15px 15px; position: relative; overflow: hidden; border: 4px solid #231145; cursor: crosshair; box-shadow: 0 15px 0 rgba(0,0,0,0.1); display: flex;}
        canvas { touch-action: none; width: 100%; height: 100%; object-fit: contain; background: white; }
        
        /* Notebook Rings Overlay */
        .notebook-rings { position: absolute; top: -10px; left: 0; width: 100%; height: 30px; display: flex; justify-content: space-evenly; pointer-events: none; z-index: 3;}
        .ring { width: 15px; height: 35px; background: #e0e0e0; border-radius: 10px; border: 2px solid #999; box-shadow: inset 0 -5px 0 rgba(0,0,0,0.2), 2px 5px 5px rgba(0,0,0,0.3); }

        /* Early Submit Overlay */
        #wait-overlay { position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(255,255,255,0.9); z-index: 10; display: none; flex-direction: column; align-items: center; justify-content: center; color: var(--bg-dark); text-align: center; }
        #wait-overlay i { font-size: 4rem; color: var(--btn-green); margin-bottom: 15px; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* Right: Tools */
        .tool-btn { 
            background: #d37388; background: var(--bg-light); color: white; border: none; border-bottom: 4px solid var(--bg-dark);
            border-radius: 10px; width: 100%; aspect-ratio: 1; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative;
        }
        .tool-btn:active, .tool-btn.active { border-bottom-width: 0px; transform: translateY(4px); margin-bottom: 4px; background: var(--accent-pink); }
        .tool-shortcut { position: absolute; top: 3px; right: 4px; font-size: 0.6rem; font-weight: 900; background: rgba(0,0,0,0.3); padding: 2px 4px; border-radius: 4px; }

        /* Bottom Bar (Thickness & Submit) */
        .draw-bottom { display: flex; gap: 15px; margin-top: 15px; width: 100%; max-width: 1200px; height: 70px; }
        .thickness-panel { background: #962541; background: var(--panel-bg); flex: 1; border-radius: 15px; border: 2px solid var(--panel-border); display: flex; align-items: center; padding: 0 20px; gap: 15px; }
        .size-btn { background: var(--bg-light); border: 3px solid rgba(0,0,0,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;}
        .size-btn:hover, .size-btn.active { background: white; }
        .size-dot { background: var(--bg-dark); border-radius: 50%; pointer-events: none; }
        
        #btn-done { flex: 0.5; height: 100%; font-size: 1.5rem; margin: 0; }

        /* --- VOTING & RESULTS --- */
        .vote-img-container { background: white; padding: 15px; border-radius: 15px; border: 5px solid var(--bg-dark); box-shadow: 0 20px 0 rgba(0,0,0,0.2); margin: 20px 0; max-width: 800px; width: 90%; }
        .vote-img { width: 100%; border-radius: 5px; object-fit: contain; max-height: 50vh; }
        .stars { display: flex; gap: 10px; }
        .star-btn { font-size: 4rem; color: rgba(255,255,255,0.3); background: none; border: none; cursor: pointer; transition: 0.1s; text-shadow: 0 5px 0 rgba(0,0,0,0.2); }
        .star-btn:hover, .star-btn.active { color: #FFD54F; transform: scale(1.1) rotate(5deg); text-shadow: 0 5px 0 #FF6F00; }

        .podium { display: flex; align-items: flex-end; justify-content: center; gap: 15px; height: 50vh; margin-top: 40px; }
        .podium-place { display: flex; flex-direction: column; align-items: center; width: 220px; }
        .podium-art { width: 100%; aspect-ratio: 4/3; object-fit: cover; border: 4px solid white; border-radius: 10px; margin-bottom: -10px; z-index: 2; box-shadow: 0 10px 20px rgba(0,0,0,0.4); background: white;}
        .podium-step { width: 100%; border-radius: 15px 15px 0 0; display: flex; flex-direction: column; align-items: center; padding-top: 25px; color: white; font-weight: 900; font-size: 2rem; border: 3px solid rgba(0,0,0,0.2); border-bottom: none;}
        .place-1 .podium-step { height: 250px; background: #FFD54F; text-shadow: 0 3px 0 #FF6F00; }
        .place-2 .podium-step { height: 180px; background: #E0E0E0; color: #757575; text-shadow: 0 3px 0 #9E9E9E; }
        .place-3 .podium-step { height: 130px; background: #FF8A65; text-shadow: 0 3px 0 #D84315; }
    </style>
</head>
<body>

    <!-- 1. LOGIN SCREEN -->
    <div id="view-login" class="view active">
        <h1 class="logo">FLASH DRAW!</h1>
        <div class="panel center-box">
            <h2 style="margin-bottom: 20px;">CHOOSE A NICKNAME</h2>
            <input type="text" id="player-name" class="input" placeholder="e.g. Picasso" maxlength="12" style="margin-bottom: 20px;">
            <button class="btn green" onclick="Game.createRoom()" style="margin-bottom: 15px;"><i class="fa-solid fa-plus"></i> CREATE ROOM</button>
            <div style="display:flex; gap:10px;">
                <input type="text" id="room-code-input" class="input" placeholder="CODE" maxlength="6" style="text-transform: uppercase;">
                <button class="btn" onclick="Game.joinRoom()"><i class="fa-solid fa-play"></i> JOIN</button>
            </div>
        </div>
    </div>

    <!-- 2. LOBBY SCREEN -->
    <div id="view-lobby" class="view">
        <h1 class="logo" style="font-size: 3rem; margin-bottom: 10px;">ROOM: <span id="lobby-code" style="color:var(--btn-green)">XXXXXX</span></h1>
        <div class="lobby-layout">
            <div class="panel" style="display:flex; flex-direction:column;">
                <h2><i class="fa-solid fa-gear"></i> SETTINGS</h2>
                <div id="settings-area" style="margin-top:20px; opacity:0.6; pointer-events:none;">
                    <div class="settings-row">
                        <span>Time (<span id="lbl-time">3</span>m)</span>
                        <input type="range" id="set-time" min="1" max="5" value="3" onchange="Game.updateSettings()">
                    </div>
                    <div class="settings-row">
                        <span>Players (<span id="lbl-players">8</span>)</span>
                        <input type="range" id="set-players" min="2" max="16" value="8" onchange="Game.updateSettings()">
                    </div>
                </div>
            </div>
            <div class="panel" style="display:flex; flex-direction:column;">
                <h2><i class="fa-solid fa-users"></i> PLAYERS</h2>
                <div class="player-list" id="player-list"></div>
                <div style="margin-top:auto; padding-top:20px;">
                    <button class="btn green" id="btn-ready" onclick="Game.toggleReady()">READY UP!</button>
                    <button class="btn red" id="btn-start" onclick="Game.startGame()" style="display:none;">START GAME!</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. DRAWING SCREEN -->
    <div id="view-draw" class="view">
        <div class="draw-top">
            <div class="round-info"><i class="fa-solid fa-palette"></i> DRAWING PHASE</div>
            <div class="timer-circle" id="game-timer">--</div>
        </div>

        <div class="draw-workspace">
            <!-- Colors -->
            <div class="tool-panel palette-grid" id="color-palette">
                <!-- JS injected colors -->
            </div>

            <!-- Canvas -->
            <div class="notebook-wrapper">
                <div class="notebook-rings">
                    <div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="ring"></div>
                    <div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="ring"></div>
                </div>
                <div class="notebook-header">
                    <span style="color:var(--ui-white); font-size:1rem; display:block;">HEY, IT'S TIME TO DRAW:</span>
                    <span id="game-theme" style="font-size:2.2rem; color:var(--btn-green); text-shadow: 0 4px 0 rgba(0,0,0,0.5);">THEME</span>
                </div>
                <div class="notebook-canvas" id="canvas-container">
                    <canvas id="main-canvas" width="1000" height="700"></canvas>
                    
                    <!-- Submitted Overlay -->
                    <div id="wait-overlay">
                        <i class="fa-solid fa-check-circle"></i>
                        <h1>AWESOME!</h1>
                        <h2 style="color:#7f8c8d; font-size:1.5rem; margin-top:10px;">Waiting for other players...</h2>
                    </div>
                </div>
            </div>

            <!-- Tools -->
            <div class="tool-panel">
                <button class="tool-btn active" onclick="DrawEngine.setTool('pencil')" id="tool-pencil">
                    <i class="fa-solid fa-pencil"></i><span class="tool-shortcut">B</span>
                </button>
                <button class="tool-btn" onclick="DrawEngine.setTool('eraser')" id="tool-eraser">
                    <i class="fa-solid fa-eraser"></i><span class="tool-shortcut">E</span>
                </button>
                <button class="tool-btn" onclick="DrawEngine.setTool('fill')" id="tool-fill">
                    <i class="fa-solid fa-fill-drip"></i><span class="tool-shortcut">G</span>
                </button>
                <div style="height:2px; background:rgba(255,255,255,0.2); margin:5px 0;"></div>
                <button class="tool-btn" onclick="DrawEngine.setTool('rect')" id="tool-rect">
                    <i class="fa-regular fa-square"></i><span class="tool-shortcut">R</span>
                </button>
                <button class="tool-btn" onclick="DrawEngine.setTool('circle')" id="tool-circle">
                    <i class="fa-regular fa-circle"></i><span class="tool-shortcut">C</span>
                </button>
                <button class="tool-btn" onclick="DrawEngine.setTool('line')" id="tool-line">
                    <i class="fa-solid fa-minus"></i><span class="tool-shortcut">L</span>
                </button>
                <div style="height:2px; background:rgba(255,255,255,0.2); margin:5px 0;"></div>
                <button class="tool-btn" onclick="DrawEngine.undo()">
                    <i class="fa-solid fa-rotate-left"></i><span class="tool-shortcut">Z</span>
                </button>
                <button class="tool-btn" onclick="DrawEngine.clearCanvas()" style="background:var(--btn-red);">
                    <i class="fa-solid fa-trash"></i>
                </button>
            </div>
        </div>

        <div class="draw-bottom">
            <div class="thickness-panel" id="size-panel">
                <!-- Sizes injected via JS -->
            </div>
            <button class="btn green" id="btn-done" onclick="Game.submitEarly()">
                <i class="fa-solid fa-check"></i> DONE!
            </button>
        </div>
    </div>

    <!-- 4. VOTING SCREEN -->
    <div id="view-vote" class="view">
        <h1 id="vote-title" style="font-size: 3rem;">RATE THIS DRAWING!</h1>
        <div class="vote-img-container">
            <img id="vote-image" class="vote-img" src="">
        </div>
        <div class="stars" id="star-container">
            <button class="star-btn" onclick="Game.submitVote(1)"><i class="fa-solid fa-star"></i></button>
            <button class="star-btn" onclick="Game.submitVote(2)"><i class="fa-solid fa-star"></i></button>
            <button class="star-btn" onclick="Game.submitVote(3)"><i class="fa-solid fa-star"></i></button>
            <button class="star-btn" onclick="Game.submitVote(4)"><i class="fa-solid fa-star"></i></button>
            <button class="star-btn" onclick="Game.submitVote(5)"><i class="fa-solid fa-star"></i></button>
        </div>
    </div>

    <!-- 5. RESULTS SCREEN -->
    <div id="view-results" class="view">
        <h1 style="font-size: 4rem; color:var(--btn-green);">WINNERS!</h1>
        <div class="podium" id="podium-container"></div>
    </div>

    <script>
        const socket = io();

        /* =========================================
           UI GENERATION
        ========================================= */
        const UI = {
            showView: (id) => {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.getElementById(id).classList.add('active');
            },
            initColors: () => {
                // Gartic style fixed palette
                const colors = [
                    '#000000', '#555555', '#AAAAAA', '#FFFFFF', 
                    '#FF0000', '#FF8800', '#FFCC00', '#00CC00',
                    '#0088FF', '#0000CC', '#8800CC', '#FF00CC',
                    '#8B4513', '#D2691E', '#F5DEB3', '#FFB6C1',
                    '#00FA9A', '#00CED1', '#4682B4', '#4B0082'
                ];
                const grid = document.getElementById('color-palette');
                colors.forEach((c, i) => {
                    const el = document.createElement('div');
                    el.className = `color-swatch ${i===0?'active':''}`;
                    el.style.backgroundColor = c;
                    el.onclick = (e) => {
                        document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                        e.target.classList.add('active');
                        DrawEngine.setColor(c);
                    };
                    grid.appendChild(el);
                });
            },
            initSizes: () => {
                const sizes = [5, 12, 25, 40, 60];
                const panel = document.getElementById('size-panel');
                sizes.forEach((s, i) => {
                    const btn = document.createElement('div');
                    btn.className = `size-btn ${i===1?'active':''}`;
                    btn.style.width = '45px'; btn.style.height = '45px';
                    
                    const dot = document.createElement('div');
                    dot.className = 'size-dot';
                    dot.style.width = Math.min(s, 35) + 'px';
                    dot.style.height = Math.min(s, 35) + 'px';
                    
                    btn.appendChild(dot);
                    btn.onclick = (e) => {
                        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        DrawEngine.setSize(s);
                    };
                    panel.appendChild(btn);
                });
            }
        };

        /* =========================================
           MULTIPLAYER GAME LOGIC
        ========================================= */
        const Game = {
            code: '', isOwner: false, voteTargetId: null, timerInterval: null, hasSubmitted: false,

            createRoom: () => {
                const name = document.getElementById('player-name').value.trim() || 'Player';
                socket.emit('create_room', { name });
            },
            joinRoom: () => {
                const name = document.getElementById('player-name').value.trim() || 'Player';
                const code = document.getElementById('room-code-input').value.trim().toUpperCase();
                if(code.length === 6) socket.emit('join_room', { code, name });
            },
            toggleReady: () => socket.emit('toggle_ready', Game.code),
            
            updateSettings: () => {
                if(!Game.isOwner) return;
                const set = {
                    roundTime: document.getElementById('set-time').value,
                    maxPlayers: document.getElementById('set-players').value,
                    voteTime: 10
                };
                document.getElementById('lbl-time').innerText = set.roundTime;
                document.getElementById('lbl-players').innerText = set.maxPlayers;
                socket.emit('update_settings', { code: Game.code, settings: set });
            },
            
            startGame: () => socket.emit('start_game', Game.code),

            submitEarly: () => {
                if(Game.hasSubmitted) return;
                Game.hasSubmitted = true;
                document.getElementById('btn-done').style.background = 'var(--panel-bg)';
                document.getElementById('btn-done').style.pointerEvents = 'none';
                document.getElementById('btn-done').innerText = 'WAITING...';
                
                document.getElementById('wait-overlay').style.display = 'flex';
                
                const img = DrawEngine.getFinalImage();
                socket.emit('submit_drawing', { code: Game.code, image: img });
            },

            submitVote: (stars) => {
                if(!Game.voteTargetId) return;
                socket.emit('submit_vote', { code: Game.code, authorId: Game.voteTargetId, stars });
                document.querySelectorAll('.star-btn').forEach((btn, i) => {
                    btn.style.color = i < stars ? '#FFD54F' : 'rgba(255,255,255,0.3)';
                    btn.style.pointerEvents = 'none';
                });
            }
        };

        socket.on('error_msg', msg => alert(msg));
        
        socket.on('room_joined', data => {
            Game.code = data.code; Game.isOwner = data.isOwner;
            document.getElementById('lobby-code').innerText = data.code;
            UI.showView('view-lobby');
            
            if(Game.isOwner) {
                document.getElementById('settings-area').style.pointerEvents = 'auto';
                document.getElementById('settings-area').style.opacity = 1;
                document.getElementById('btn-start').style.display = 'block';
                document.getElementById('btn-ready').style.display = 'none';
            }
        });

        socket.on('update_players', players => {
            const list = document.getElementById('player-list');
            list.innerHTML = '';
            let allReady = true;
            players.forEach(p => {
                if(!p.ready) allReady = false;
                list.innerHTML += `
                    <div class="player-card">
                        <span>${p.name} ${p.id === socket.id ? '(YOU)' : ''}</span>
                        <div class="status-dot ${p.ready ? 'ready' : ''}"></div>
                    </div>`;
            });
            if(Game.isOwner && players.length > 1) {
                document.getElementById('btn-start').disabled = !allReady;
                document.getElementById('btn-start').style.opacity = allReady ? 1 : 0.5;
            }
        });

        socket.on('game_started', data => {
            UI.showView('view-draw');
            document.getElementById('game-theme').innerText = data.theme;
            
            // Reset state
            Game.hasSubmitted = false;
            document.getElementById('wait-overlay').style.display = 'none';
            document.getElementById('btn-done').style.background = 'var(--btn-green)';
            document.getElementById('btn-done').style.pointerEvents = 'auto';
            document.getElementById('btn-done').innerHTML = '<i class="fa-solid fa-check"></i> DONE!';
            
            DrawEngine.init();

            let timeLeft = data.time;
            clearInterval(Game.timerInterval);
            Game.timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('game-timer').innerText = timeLeft > 0 ? timeLeft : 0;
                // Client side timer is visual only. Server forces submission.
            }, 1000);
        });

        // Server requested a forced submission because timer ran out
        socket.on('force_submit', () => {
            clearInterval(Game.timerInterval);
            if(!Game.hasSubmitted) {
                Game.submitEarly(); // Auto submit what they have
            }
        });

        socket.on('start_vote', data => {
            clearInterval(Game.timerInterval);
            UI.showView('view-vote');
            Game.voteTargetId = data.authorId;
            document.getElementById('vote-image').src = data.image;
            
            const title = document.getElementById('vote-title');
            if(data.authorId === socket.id) {
                title.innerText = "YOUR MASTERPIECE!";
                document.getElementById('star-container').style.display = 'none';
            } else {
                title.innerText = "RATE THIS DRAWING!";
                document.getElementById('star-container').style.display = 'flex';
                document.querySelectorAll('.star-btn').forEach(btn => {
                    btn.style.color = 'rgba(255,255,255,0.3)';
                    btn.style.pointerEvents = 'auto';
                });
            }
        });

        socket.on('show_results', top3 => {
            UI.showView('view-results');
            const p = document.getElementById('podium-container');
            p.innerHTML = '';
            
            const layout = [
                { class: 'place-2', title: '2ND', data: top3[1] },
                { class: 'place-1', title: '1ST', data: top3[0] },
                { class: 'place-3', title: '3RD', data: top3[2] }
            ];

            layout.forEach(pos => {
                if(pos.data) {
                    p.innerHTML += `
                    <div class="podium-place ${pos.class}">
                        <img class="podium-art" src="${pos.data.image}">
                        <div class="podium-step">
                            <span style="font-size:1.2rem; margin-bottom:5px;">${pos.data.name}</span>
                            ${pos.title}
                            <span style="font-size:1rem; font-weight:700;">${pos.data.score} ⭐</span>
                        </div>
                    </div>`;
                }
            });

            const duration = 8000;
            const end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#FFD54F', '#29B6F6', '#FF4081'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#FFD54F', '#29B6F6', '#FF4081'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        });

        socket.on('return_to_lobby', () => {
            UI.showView('view-lobby');
            socket.emit('toggle_ready', Game.code); // Unready everyone
            socket.emit('toggle_ready', Game.code); // Quick hack to force state update without backend change
        });


        /* =========================================
           GARTIC STYLE DRAWING ENGINE
        ========================================= */
        const DrawEngine = {
            canvas: document.getElementById('main-canvas'),
            ctx: document.getElementById('main-canvas').getContext('2d', { willReadFrequently: true }),
            width: 1000, height: 700,
            
            tool: 'pencil', color: '#000000', size: 12,
            isDrawing: false, lastX: 0, lastY: 0, startX: 0, startY: 0,
            history: [], redoStack: [], previewData: null,

            init: function() {
                this.ctx.lineCap = 'round';
                this.ctx.lineJoin = 'round';
                this.clearCanvas(true); // pure white
                this.history = [];
                this.saveState();
                
                // Remove old listeners to prevent stacking
                this.canvas.onpointerdown = this.down.bind(this);
                window.onpointermove = this.move.bind(this);
                window.onpointerup = this.up.bind(this);
                
                window.onkeydown = (e) => {
                    if(document.getElementById('wait-overlay').style.display === 'flex') return;
                    if(e.target.tagName === 'INPUT') return;
                    if(e.ctrlKey && e.code === 'KeyZ') this.undo();
                    if(e.code === 'KeyB') this.setTool('pencil');
                    if(e.code === 'KeyE') this.setTool('eraser');
                    if(e.code === 'KeyG') this.setTool('fill');
                    if(e.code === 'KeyR') this.setTool('rect');
                    if(e.code === 'KeyC') this.setTool('circle');
                    if(e.code === 'KeyL') this.setTool('line');
                };
            },

            getPos: function(e) {
                const rect = this.canvas.getBoundingClientRect();
                // Map CSS size to internal canvas resolution
                const scaleX = this.canvas.width / rect.width;
                const scaleY = this.canvas.height / rect.height;
                return {
                    x: (e.clientX - rect.left) * scaleX,
                    y: (e.clientY - rect.top) * scaleY
                };
            },

            down: function(e) {
                if(Game.hasSubmitted) return;
                const pos = this.getPos(e);
                this.isDrawing = true;
                this.startX = pos.x; this.startY = pos.y;
                this.lastX = pos.x; this.lastY = pos.y;

                this.ctx.lineWidth = this.size;
                this.ctx.strokeStyle = this.tool === 'eraser' ? '#FFFFFF' : this.color;
                this.ctx.fillStyle = this.ctx.strokeStyle;

                if(this.tool === 'fill') {
                    this.floodFill(Math.floor(pos.x), Math.floor(pos.y));
                    this.isDrawing = false;
                    this.saveState();
                } else if(['rect', 'circle', 'line'].includes(this.tool)) {
                    this.previewData = this.ctx.getImageData(0,0, this.width, this.height);
                } else {
                    this.ctx.beginPath();
                    this.ctx.arc(pos.x, pos.y, this.size/2, 0, Math.PI*2);
                    this.ctx.fill();
                    this.ctx.beginPath();
                    this.ctx.moveTo(pos.x, pos.y);
                }
            },

            move: function(e) {
                if(!this.isDrawing) return;
                const pos = this.getPos(e);

                if(['rect', 'circle', 'line'].includes(this.tool)) {
                    this.ctx.putImageData(this.previewData, 0, 0);
                    this.ctx.beginPath();
                    if(this.tool === 'rect') {
                        this.ctx.rect(this.startX, this.startY, pos.x - this.startX, pos.y - this.startY);
                    } else if(this.tool === 'circle') {
                        const r = Math.sqrt(Math.pow(pos.x - this.startX, 2) + Math.pow(pos.y - this.startY, 2));
                        this.ctx.arc(this.startX, this.startY, r, 0, Math.PI*2);
                    } else if(this.tool === 'line') {
                        this.ctx.moveTo(this.startX, this.startY);
                        this.ctx.lineTo(pos.x, pos.y);
                    }
                    this.ctx.stroke();
                } else {
                    this.ctx.lineTo(pos.x, pos.y);
                    this.ctx.stroke();
                    this.ctx.beginPath();
                    this.ctx.moveTo(pos.x, pos.y);
                }
            },

            up: function() {
                if(!this.isDrawing) return;
                this.isDrawing = false;
                if(['rect', 'circle', 'line'].includes(this.tool)) this.ctx.stroke();
                this.saveState();
            },

            floodFill: function(x, y) {
                const imgData = this.ctx.getImageData(0,0,this.width,this.height);
                const data = imgData.data;
                const getIdx = (x,y) => (y * this.width + x) * 4;
                const startIdx = getIdx(x, y);
                const [r, g, b] = [data[startIdx], data[startIdx+1], data[startIdx+2]];
                
                const hex = this.tool === 'eraser' ? 'ffffff' : this.color.replace('#','');
                const [fr, fg, fb] = [parseInt(hex.substring(0,2),16), parseInt(hex.substring(2,4),16), parseInt(hex.substring(4,6),16)];

                if(r===fr && g===fg && b===fb) return;

                const match = (i) => data[i]===r && data[i+1]===g && data[i+2]===b;
                const set = (i) => { data[i]=fr; data[i+1]=fg; data[i+2]=fb; data[i+3]=255; };

                const stack = [[x, y]];
                while(stack.length) {
                    let [cx, cy] = stack.pop();
                    let idx = getIdx(cx, cy);
                    while(cy >= 0 && match(idx)) { cy--; idx -= this.width*4; }
                    cy++; idx += this.width*4;
                    
                    let left = false, right = false;
                    while(cy < this.height && match(idx)) {
                        set(idx);
                        if(cx > 0) {
                            if(match(idx-4)) { if(!left) { stack.push([cx-1, cy]); left=true; } }
                            else left = false;
                        }
                        if(cx < this.width-1) {
                            if(match(idx+4)) { if(!right) { stack.push([cx+1, cy]); right=true; } }
                            else right = false;
                        }
                        cy++; idx += this.width*4;
                    }
                }
                this.ctx.putImageData(imgData, 0, 0);
            },

            saveState: function() {
                this.history.push(this.ctx.getImageData(0,0,this.width,this.height));
                if(this.history.length > 20) this.history.shift();
            },
            undo: function() {
                if(this.history.length > 1) {
                    this.history.pop();
                    this.ctx.putImageData(this.history[this.history.length-1], 0, 0);
                }
            },
            clearCanvas: function(isInit=false) {
                this.ctx.fillStyle = '#FFFFFF';
                this.ctx.fillRect(0,0,this.width,this.height);
                if(!isInit) this.saveState();
            },
            setTool: function(t) {
                this.tool = t;
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                const btn = document.getElementById('tool-' + t);
                if(btn) btn.classList.add('active');
            },
            setColor: function(c) { this.color = c; if(this.tool==='eraser') this.setTool('pencil'); },
            setSize: function(s) { this.size = s; },
            getFinalImage: function() {
                // Downscale slightly for base64 transmit size
                const out = document.createElement('canvas');
                out.width = 800; out.height = 560; 
                out.getContext('2d').drawImage(this.canvas, 0, 0, out.width, out.height);
                return out.toDataURL('image/jpeg', 0.8);
            }
        };

        // Init UI
        UI.initColors();
        UI.initSizes();
    </script>
</body>
</html>
