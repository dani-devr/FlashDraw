<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flash Draw!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bw-border: 4px solid #000;
            --bw-shadow: 6px 6px 0px #000;
            --bw-shadow-hover: 2px 2px 0px #000;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f0f0f0;
            background-image: radial-gradient(#d1d1d1 2px, transparent 2px);
            background-size: 32px 32px;
            color: #000;
            overflow: hidden; /* Prevent body scroll, handle inside */
            user-select: none;
            touch-action: none;
        }

        /* Neo-Brutalist Components */
        .bw-panel {
            background: #fff;
            border: var(--bw-border);
            border-radius: 24px;
            box-shadow: var(--bw-shadow);
        }

        .bw-btn {
            background: #000;
            color: #fff;
            border: var(--bw-border);
            border-radius: 16px;
            font-weight: 900;
            text-transform: uppercase;
            transition: all 0.15s ease-out;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .bw-btn:hover:not(:disabled) {
            transform: translate(4px, 4px);
            box-shadow: var(--bw-shadow-hover);
            background: #222;
        }

        .bw-btn-icon {
            background: #fff;
            color: #000;
            border: 3px solid #000;
            border-radius: 12px;
            padding: 8px;
            transition: all 0.1s ease-out;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bw-btn-icon:hover {
            background: #f0f0f0;
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }
        .tool-active {
            background: #000 !important;
            color: #fff !important;
            box-shadow: inset 0px 4px 0px rgba(255,255,255,0.2) !important;
            transform: translateY(2px);
        }

        .bw-input {
            background: #fff;
            border: var(--bw-border);
            border-radius: 16px;
            padding: 16px;
            font-weight: 700;
            font-size: 1.125rem;
            outline: none;
            width: 100%;
        }

        /* Canvas Styles */
        #canvas-area {
            background: #cfcfcf;
            cursor: crosshair;
            position: relative;
        }
        #canvas-wrapper {
            position: absolute;
            top: 50%; left: 50%;
            transform-origin: center;
            box-shadow: 12px 12px 0px rgba(0,0,0,1);
            border: 4px solid #000;
            background: #fff;
            transition: transform 0.05s linear;
        }
        canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        #draft-canvas { pointer-events: none; }

        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #000; border-radius: 10px; border: 2px solid #fff; }
    </style>
</head>
<body class="w-screen h-screen flex flex-col relative">

    <div id="toast" class="fixed top-8 right-8 bw-panel px-6 py-4 z-50 transform transition-transform translate-x-[150%] hidden flex items-center gap-3">
        <i data-lucide="alert-circle"></i><span id="toast-msg" class="font-bold"></span>
    </div>

    <!-- ==================== SCREEN: HOME ==================== -->
    <div id="screen-home" class="w-full h-full flex items-center justify-center p-4">
        <div class="max-w-4xl grid md:grid-cols-2 gap-8 items-center w-full">
            <div class="space-y-6">
                <div class="bw-panel p-8 text-center bg-black text-white border-white border-[6px] shadow-[8px_8px_0px_#fff]">
                    <h1 class="text-6xl font-black italic tracking-tighter mb-2 uppercase">Flash Draw</h1>
                    <p class="font-bold text-gray-300 tracking-widest">MULTIPLAYER EDITION</p>
                </div>
                <div class="bw-panel p-8">
                    <label class="block font-black text-lg mb-2 uppercase">Choose Nickname</label>
                    <input type="text" id="player-name" class="bw-input" placeholder="e.g. Picasso" maxlength="15">
                </div>
            </div>
            <div class="space-y-6 bw-panel p-8">
                <button onclick="createRoom()" class="bw-btn w-full py-5 text-xl"><i data-lucide="plus-circle"></i> Create Room</button>
                <div class="relative flex items-center py-2">
                    <div class="flex-grow border-t-[4px] border-black"></div>
                    <span class="flex-shrink-0 mx-4 font-black uppercase text-xl">OR</span>
                    <div class="flex-grow border-t-[4px] border-black"></div>
                </div>
                <div class="flex gap-4">
                    <input type="text" id="room-code-input" class="bw-input text-center uppercase tracking-widest" placeholder="CODE" maxlength="6">
                    <button onclick="joinRoom()" class="bw-btn px-8">Join</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== SCREEN: LOBBY ==================== -->
    <div id="screen-lobby" class="w-full h-full flex flex-col hidden p-8 max-w-5xl mx-auto">
        <div class="flex items-center justify-between mb-8">
            <div class="bw-panel px-8 py-4 flex items-center gap-4 bg-black text-white">
                <span class="font-bold text-gray-400">ROOM CODE</span>
                <span id="lobby-code-display" class="text-4xl font-black tracking-widest text-white">------</span>
            </div>
            <button id="start-game-btn" onclick="startGame()" class="bw-btn px-10 py-5 text-2xl hidden"><i data-lucide="play"></i> Start Match</button>
            <div id="waiting-host-msg" class="bw-panel px-8 py-5 text-xl font-bold italic">Waiting for host...</div>
        </div>
        <div class="bw-panel flex-1 p-8">
            <h2 class="text-2xl font-black uppercase border-b-4 border-black pb-4 mb-6">Players</h2>
            <div id="players-list" class="grid grid-cols-2 md:grid-cols-4 gap-6 overflow-y-auto"></div>
        </div>
    </div>

    <!-- ==================== SCREEN: GAME (MINIMALIST CANVAS) ==================== -->
    <div id="screen-game" class="w-full h-full flex flex-col hidden">
        <!-- Header -->
        <header class="absolute top-4 left-4 right-4 z-20 flex justify-between items-center pointer-events-none">
            <div class="bw-panel px-6 py-3 flex items-center gap-4 pointer-events-auto shadow-[4px_4px_0px_#000]">
                <span class="font-black uppercase text-gray-500 text-sm">Theme</span>
                <span id="game-theme" class="text-xl font-black">THEME</span>
            </div>
            <div id="timer-display" class="bw-panel px-6 py-3 text-2xl font-black bg-black text-white pointer-events-auto">05:00</div>
            <button onclick="submitDrawing()" class="bw-btn px-6 py-3 pointer-events-auto text-sm"><i data-lucide="check"></i> Submit</button>
        </header>

        <!-- Canvas Workspace -->
        <div id="canvas-area" class="flex-1 w-full h-full overflow-hidden flex items-center justify-center">
            <div id="canvas-wrapper" style="width: 1200px; height: 800px; transform: translate(-50%, -50%) scale(1);">
                <canvas id="main-canvas" width="1200" height="800"></canvas>
                <canvas id="draft-canvas" width="1200" height="800"></canvas>
            </div>
        </div>

        <!-- Floating Dock / Minimalist Toolbar -->
        <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 z-20 bw-panel px-4 py-3 flex items-center gap-3 shadow-[8px_8px_0px_#000]">
            
            <!-- Tools -->
            <button class="bw-btn-icon tool-active" data-tool="pencil" title="Pencil (P)"><i data-lucide="pencil" class="w-5 h-5"></i></button>
            <button class="bw-btn-icon" data-tool="brush" title="Brush (B)"><i data-lucide="brush" class="w-5 h-5"></i></button>
            <button class="bw-btn-icon" data-tool="eraser" title="Eraser (E)"><i data-lucide="eraser" class="w-5 h-5"></i></button>
            <button class="bw-btn-icon" data-tool="pan" title="Pan Canvas (Space)"><i data-lucide="hand" class="w-5 h-5"></i></button>
            
            <div class="w-px h-8 bg-gray-300 mx-1"></div>
            
            <!-- Shapes -->
            <button class="bw-btn-icon" data-tool="rect"><i data-lucide="square" class="w-5 h-5"></i></button>
            <button class="bw-btn-icon" data-tool="circle"><i data-lucide="circle" class="w-5 h-5"></i></button>
            
            <div class="w-px h-8 bg-gray-300 mx-1"></div>

            <!-- Settings -->
            <div class="flex flex-col items-center w-24 px-2">
                <span class="text-[10px] font-bold uppercase mb-1">Size</span>
                <input type="range" id="size-slider" min="1" max="100" value="5" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer border border-black">
            </div>

            <div class="w-px h-8 bg-gray-300 mx-1"></div>

            <!-- Colors -->
            <div class="flex gap-2">
                <button class="color-btn w-8 h-8 rounded-full border-2 border-black" style="background: #000;" data-color="#000"></button>
                <button class="color-btn w-8 h-8 rounded-full border-2 border-black" style="background: #fff;" data-color="#fff"></button>
                <button class="color-btn w-8 h-8 rounded-full border-2 border-black" style="background: #ff3b3b;" data-color="#ff3b3b"></button>
                <button class="color-btn w-8 h-8 rounded-full border-2 border-black" style="background: #3b82f6;" data-color="#3b82f6"></button>
                <button class="color-btn w-8 h-8 rounded-full border-2 border-black relative overflow-hidden" onclick="document.getElementById('custom-color').click()">
                    <i data-lucide="palette" class="w-4 h-4 absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-black"></i>
                </button>
                <input type="color" id="custom-color" class="hidden">
            </div>

            <div class="w-px h-8 bg-gray-300 mx-1"></div>

            <!-- Actions -->
            <button onclick="undo()" class="bw-btn-icon" title="Undo (Ctrl+Z)"><i data-lucide="undo" class="w-5 h-5"></i></button>
            <button onclick="clearCanvas()" class="bw-btn-icon text-red-500" title="Clear Canvas"><i data-lucide="trash-2" class="w-5 h-5"></i></button>

        </div>
    </div>

    <!-- ==================== SCREEN: VOTING ==================== -->
    <div id="screen-voting" class="w-full h-full flex flex-col hidden py-4 max-w-5xl mx-auto">
        <div class="bw-panel px-8 py-4 mb-6 flex justify-between items-center bg-black text-white mx-4">
            <span id="voting-theme" class="text-3xl font-black uppercase">THEME</span>
            <span id="voting-counter" class="text-xl font-bold bg-white text-black px-4 py-1 rounded-lg">1 / 5</span>
        </div>
        <div class="flex-1 bw-panel flex flex-col items-center justify-center p-8 relative overflow-hidden mx-4">
            <h2 id="artist-name" class="absolute top-8 left-8 text-2xl font-black px-6 py-2 border-4 border-black bg-white rounded-xl z-10 shadow-[4px_4px_0px_#000]">Artist Name</h2>
            <img id="voting-image" src="" alt="Drawing" class="max-h-full max-w-full border-4 border-black shadow-[8px_8px_0px_#000] rounded-xl object-contain">
        </div>
        <div class="bw-panel mt-6 p-6 flex flex-col items-center gap-4 mx-4">
            <h3 class="text-xl font-black uppercase tracking-widest">Rate this masterpiece</h3>
            <div id="star-container" class="flex gap-4">
                <button class="star-btn hover:scale-125 transition-transform" data-rating="1"><i data-lucide="star" class="w-12 h-12 text-gray-300"></i></button>
                <button class="star-btn hover:scale-125 transition-transform" data-rating="2"><i data-lucide="star" class="w-12 h-12 text-gray-300"></i></button>
                <button class="star-btn hover:scale-125 transition-transform" data-rating="3"><i data-lucide="star" class="w-12 h-12 text-gray-300"></i></button>
                <button class="star-btn hover:scale-125 transition-transform" data-rating="4"><i data-lucide="star" class="w-12 h-12 text-gray-300"></i></button>
                <button class="star-btn hover:scale-125 transition-transform" data-rating="5"><i data-lucide="star" class="w-12 h-12 text-gray-300"></i></button>
            </div>
            <p id="vote-status" class="font-bold text-gray-500 h-6"></p>
        </div>
    </div>

    <!-- ==================== SCREEN: RESULTS ==================== -->
    <div id="screen-results" class="w-full h-full flex flex-col hidden py-8 max-w-4xl mx-auto">
        <h1 class="text-5xl font-black text-center mb-8 uppercase bg-black text-white py-4 bw-panel mx-4">Final Podium</h1>
        <div id="podium-list" class="flex-1 overflow-y-auto space-y-4 px-4 pb-12"></div>
        <div class="flex justify-center mt-6">
            <button id="return-lobby-btn" onclick="returnToLobby()" class="bw-btn px-12 py-5 text-2xl hidden">Return to Lobby</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const socket = typeof io !== 'undefined' ? io() : { on:()=>{}, emit:()=>{}, id: 'test' };
        
        let currentRoom = '';
        let amIHost = false;
        let myId = '';
        let gameEndTime = 0;
        let timerInterval = null;
        let hasSubmitted = false;

        const screens = {
            home: document.getElementById('screen-home'),
            lobby: document.getElementById('screen-lobby'),
            game: document.getElementById('screen-game'),
            voting: document.getElementById('screen-voting'),
            results: document.getElementById('screen-results')
        };

        function showScreen(name) {
            Object.values(screens).forEach(s => s.classList.add('hidden'));
            screens[name].classList.remove('hidden');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.remove('hidden', 'translate-x-[150%]');
            setTimeout(() => t.classList.add('translate-x-[150%]'), 3000);
        }

        socket.on('connect', () => { myId = socket.id; });
        socket.on('error_msg', (msg) => showToast(msg));
        
        socket.on('room_joined', (data) => {
            currentRoom = data.roomCode;
            amIHost = data.isHost;
            document.getElementById('lobby-code-display').innerText = currentRoom;
            document.getElementById('start-game-btn').classList.toggle('hidden', !amIHost);
            document.getElementById('waiting-host-msg').classList.toggle('hidden', amIHost);
            showScreen('lobby');
        });

        socket.on('update_players', (players) => {
            const list = document.getElementById('players-list');
            list.innerHTML = '';
            players.forEach(p => {
                const div = document.createElement('div');
                div.className = "bw-panel p-4 flex flex-col items-center gap-2 relative";
                if(p.id === socket.id) div.classList.add('bg-gray-100');
                div.innerHTML = `<div class="w-16 h-16 rounded-full border-4 border-black bg-white flex items-center justify-center font-black text-2xl uppercase">${p.name.charAt(0)}</div><span class="font-bold truncate w-full text-center">${p.name}</span>`;
                list.appendChild(div);
            });
        });

        socket.on('you_are_host', () => {
            amIHost = true;
            document.getElementById('start-game-btn').classList.remove('hidden');
            document.getElementById('waiting-host-msg').classList.add('hidden');
            showToast("You are now the host!");
        });

        socket.on('game_started', (data) => {
            hasSubmitted = false;
            document.getElementById('game-theme').innerText = data.theme;
            gameEndTime = data.endTime;
            initCanvas();
            showScreen('game');
            startTimer();
        });

        // ------------------ TIMER ------------------
        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const now = Date.now();
                const remaining = Math.max(0, Math.floor((gameEndTime - now) / 1000));
                const m = Math.floor(remaining / 60).toString().padStart(2, '0');
                const s = (remaining % 60).toString().padStart(2, '0');
                document.getElementById('timer-display').innerText = `${m}:${s}`;
                if (remaining === 0) submitDrawing();
            }, 1000);
        }

        // ------------------ MINIMALIST CANVAS ENGINE + UNDO + ZOOM ------------------
        const canvasArea = document.getElementById('canvas-area');
        const wrapper = document.getElementById('canvas-wrapper');
        const canvas = document.getElementById('main-canvas');
        const draft = document.getElementById('draft-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const draftCtx = draft.getContext('2d');

        let isDrawing = false;
        let isPanning = false;
        let lastX = 0, lastY = 0, startX = 0, startY = 0;
        
        let zoom = 1;
        let panX = -50; // CSS translate uses percentages
        let panY = -50;
        let dragStartX = 0, dragStartY = 0;

        let activeTool = 'pencil';
        let brushColor = '#000000';
        let brushSize = 5;
        let undoStack = [];

        function initCanvas() {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            zoom = 1; panX = -50; panY = -50;
            undoStack = [];
            saveState(); // Save initial blank state
            updateTransform();
        }

        // --- UNDO SYSTEM (Ctrl+Z) ---
        function saveState() {
            if (undoStack.length > 20) undoStack.shift(); // Max 20 history states
            undoStack.push(canvas.toDataURL());
        }

        function undo() {
            if (undoStack.length > 1) {
                undoStack.pop(); // Remove current state
                let img = new Image();
                img.src = undoStack[undoStack.length - 1]; // Load previous
                img.onload = () => {
                    ctx.clearRect(0,0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
            } else if (undoStack.length === 1) {
                clearCanvas(); // Back to white
            }
        }

        function clearCanvas() {
            saveState();
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
                e.preventDefault();
                undo();
            }
        });

        // --- ZOOM & PAN (Scroll Wheel) ---
        function updateTransform() {
            wrapper.style.transform = `translate(${panX}%, ${panY}%) scale(${zoom})`;
        }

        canvasArea.addEventListener('wheel', (e) => {
            e.preventDefault(); // Prevent page scroll
            // Scroll to Zoom. No zooming out less than 1.
            const zoomDelta = e.deltaY > 0 ? -0.1 : 0.1;
            zoom = Math.max(1, Math.min(zoom + zoomDelta, 5));
            updateTransform();
        }, { passive: false });

        // --- DRAWING LOGIC ---
        function getPos(e) {
            const rect = wrapper.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const x = (clientX - rect.left) / zoom;
            const y = (clientY - rect.top) / zoom;
            return { x, y, clientX, clientY };
        }

        function applySettings(context) {
            context.lineCap = 'round';
            context.lineJoin = 'round';
            context.lineWidth = brushSize;
            context.strokeStyle = brushColor;
            context.fillStyle = brushColor;
            context.shadowBlur = 0;
            context.shadowColor = 'transparent';
            context.globalCompositeOperation = activeTool === 'eraser' ? 'destination-out' : 'source-over';
        }

        function startInteraction(e) {
            const { x, y, clientX, clientY } = getPos(e);
            
            // Middle click or spacebar or Pan tool triggers panning
            if (e.button === 1 || activeTool === 'pan') {
                isPanning = true;
                dragStartX = clientX;
                dragStartY = clientY;
                canvasArea.style.cursor = 'grabbing';
                return;
            }

            isDrawing = true;
            saveState(); // Save state for Undo BEFORE drawing starts

            startX = x; startY = y;
            lastX = x; lastY = y;

            if (activeTool === 'pencil' || activeTool === 'brush' || activeTool === 'eraser') {
                applySettings(ctx);
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x, y);
                ctx.stroke();
            }
        }

        function moveInteraction(e) {
            if (isPanning) {
                e.preventDefault();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const dx = ((clientX - dragStartX) / window.innerWidth) * 100;
                const dy = ((clientY - dragStartY) / window.innerHeight) * 100;
                panX += dx; panY += dy;
                dragStartX = clientX; dragStartY = clientY;
                updateTransform();
                return;
            }

            if (!isDrawing) return;
            e.preventDefault();
            const { x, y } = getPos(e);

            if (activeTool === 'pencil' || activeTool === 'brush' || activeTool === 'eraser') {
                ctx.lineTo(x, y);
                ctx.stroke();
                lastX = x; lastY = y;
            } else if (activeTool === 'rect' || activeTool === 'circle') {
                draftCtx.clearRect(0, 0, draft.width, draft.height);
                applySettings(draftCtx);
                draftCtx.beginPath();
                if (activeTool === 'rect') draftCtx.rect(startX, startY, x - startX, y - startY);
                else {
                    const radius = Math.sqrt(Math.pow(x-startX,2) + Math.pow(y-startY,2));
                    draftCtx.arc(startX, startY, radius, 0, Math.PI*2);
                }
                draftCtx.stroke();
            }
        }

        function endInteraction() {
            if (isPanning) {
                isPanning = false;
                canvasArea.style.cursor = activeTool === 'pan' ? 'grab' : 'crosshair';
                return;
            }
            if (!isDrawing) return;
            isDrawing = false;
            
            if (activeTool === 'rect' || activeTool === 'circle') {
                applySettings(ctx);
                ctx.drawImage(draft, 0, 0);
                draftCtx.clearRect(0, 0, draft.width, draft.height);
            }
        }

        wrapper.addEventListener('mousedown', startInteraction);
        window.addEventListener('mousemove', moveInteraction);
        window.addEventListener('mouseup', endInteraction);
        wrapper.addEventListener('touchstart', startInteraction, {passive: false});
        window.addEventListener('touchmove', moveInteraction, {passive: false});
        window.addEventListener('touchend', endInteraction);

        // UI Controls
        document.querySelectorAll('[data-tool]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('[data-tool]').forEach(b => b.classList.remove('tool-active'));
                const target = e.currentTarget;
                target.classList.add('tool-active');
                activeTool = target.dataset.tool;
                canvasArea.style.cursor = activeTool === 'pan' ? 'grab' : 'crosshair';
            });
        });

        document.getElementById('size-slider').addEventListener('input', (e) => { brushSize = e.target.value; });
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', (e) => { brushColor = e.target.dataset.color; activeTool='pencil'; document.querySelector('[data-tool="pencil"]').click(); });
        });
        document.getElementById('custom-color').addEventListener('input', (e) => { brushColor = e.target.value; activeTool='pencil'; document.querySelector('[data-tool="pencil"]').click(); });

        // ------------------ SUBMIT & VOTING ------------------
        function submitDrawing() {
            if(hasSubmitted) return;
            hasSubmitted = true;
            clearInterval(timerInterval);
            
            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
            socket.emit('submit_drawing', { roomCode: currentRoom, image: dataUrl });
            
            wrapper.innerHTML = `<div class="w-full h-full flex flex-col items-center justify-center bg-gray-100"><i data-lucide="check-circle" class="w-24 h-24 mb-4"></i><h2 class="text-3xl font-black uppercase">Submitted!</h2><p class="font-bold text-gray-500">Waiting for others...</p></div>`;
            lucide.createIcons();
        }

        socket.on('show_drawing_vote', (data) => {
            document.getElementById('voting-theme').innerText = document.getElementById('game-theme').innerText;
            document.getElementById('voting-counter').innerText = `${data.index} / ${data.total}`;
            document.getElementById('artist-name').innerText = data.artistName;
            document.getElementById('voting-image').src = data.drawing;
            
            const starBtns = document.querySelectorAll('.star-btn');
            starBtns.forEach(b => {
                b.querySelector('i').classList.remove('fill-black', 'text-black');
                b.querySelector('i').classList.add('text-gray-300');
                b.disabled = (data.artistId === myId);
            });
            document.getElementById('vote-status').innerText = data.artistId === myId ? "This is your drawing!" : "";
            showScreen('voting');
        });

        document.querySelectorAll('.star-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const rating = parseInt(e.currentTarget.dataset.rating);
                socket.emit('submit_vote', { roomCode: currentRoom, stars: rating });
                
                document.querySelectorAll('.star-btn').forEach((b, i) => {
                    if (i < rating) {
                        b.querySelector('i').classList.remove('text-gray-300');
                        b.querySelector('i').classList.add('fill-black', 'text-black');
                    }
                    b.disabled = true;
                });
                document.getElementById('vote-status').innerText = `You rated ${rating} stars!`;
            });
        });

        socket.on('show_results', (players) => {
            const list = document.getElementById('podium-list');
            list.innerHTML = '';
            players.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = "bw-panel p-6 flex items-center gap-6 " + (i === 0 ? "bg-black text-white" : "");
                div.innerHTML = `<div class="text-4xl font-black ${i===0 ? 'text-yellow-400' : ''}">#${i+1}</div><div class="flex-1 text-2xl font-bold truncate">${p.name}</div><div class="text-xl font-black flex items-center gap-2">${p.score} <i data-lucide="star" class="w-6 h-6 ${i===0 ? 'fill-yellow-400 text-yellow-400' : 'fill-black'}"></i></div>`;
                list.appendChild(div);
            });
            document.getElementById('return-lobby-btn').classList.toggle('hidden', !amIHost);
            lucide.createIcons();
            showScreen('results');
        });

        function returnToLobby() {
            if (amIHost) socket.emit('return_to_lobby', currentRoom);
        }
        socket.on('returned_to_lobby', () => showScreen('lobby'));

    </script>
</body>
</html>
