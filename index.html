<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flash Draw! - Multiplayer Drawing</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Socket.IO & Confetti -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg: #0f111a;
            --surface: rgba(255, 255, 255, 0.05);
            --surface-hover: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.1);
            --primary: #7C3AED;
            --primary-hover: #6D28D9;
            --accent: #F472B6;
            --text: #F8FAFC;
            --text-muted: #94A3B8;
            --danger: #EF4444;
            --success: #10B981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; user-select: none; }
        body { background-color: var(--bg); color: var(--text); overflow: hidden; height: 100vh; width: 100vw; display: flex; flex-direction: column; }
        
        /* Glassmorphism Classes */
        .glass { background: var(--surface); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 1rem; }
        .btn:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(124, 58, 237, 0.4); }
        .btn.secondary { background: var(--surface); border: 1px solid var(--border); }
        .btn.secondary:hover { background: var(--surface-hover); }
        .btn.danger { background: var(--danger); }
        .input { background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: white; padding: 12px 16px; border-radius: 12px; font-size: 1rem; outline: none; transition: border 0.2s; width: 100%; }
        .input:focus { border-color: var(--primary); }
        
        /* Layouts */
        .view { display: none; height: 100%; width: 100%; position: absolute; top: 0; left: 0; }
        .view.active { display: flex; flex-direction: column; animation: fadeIn 0.4s ease forwards; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        
        /* --- LOGIN & LOBBY VIEWS --- */
        .center-container { margin: auto; max-width: 500px; width: 90%; padding: 40px; text-align: center; }
        .logo { font-size: 3rem; font-weight: 800; background: linear-gradient(to right, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; letter-spacing: -1px; }
        .flex-col { display: flex; flex-direction: column; gap: 15px; }
        .flex-row { display: flex; gap: 15px; }

        /* Lobby specific */
        .lobby-layout { display: grid; grid-template-columns: 300px 1fr 300px; gap: 20px; height: 100%; padding: 20px; }
        .panel { display: flex; flex-direction: column; padding: 20px; }
        .panel h2 { font-size: 1.2rem; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .player-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .player-card { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; background: rgba(0,0,0,0.2); border-radius: 8px; }
        .player-card .status { height: 10px; width: 10px; border-radius: 50%; background: var(--danger); }
        .player-card .status.ready { background: var(--success); }
        .setting-group { margin-bottom: 15px; text-align: left; }
        .setting-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-muted); }
        .setting-group input[type=range] { width: 100%; accent-color: var(--primary); }

        /* Chat System */
        .chat-box { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; font-size: 0.9rem; }
        .chat-msg { padding: 8px 12px; border-radius: 8px; background: rgba(0,0,0,0.2); align-self: flex-start; max-width: 90%; word-wrap: break-word;}
        .chat-msg.sys { background: none; color: var(--text-muted); font-style: italic; }
        .chat-msg b { color: var(--accent); }
        .chat-input { display: flex; gap: 10px; }
        
        /* --- DRAWING VIEW --- */
        #view-draw { display: none; grid-template-columns: 70px 1fr 250px; grid-template-rows: 60px 1fr; height: 100vh; background: #1a1c23; }
        #view-draw.active { display: grid; }
        
        .top-bar { grid-column: 1 / 4; grid-row: 1; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 10; border-bottom: 1px solid var(--border); }
        .theme-display { font-size: 1.5rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); text-shadow: 0 0 10px rgba(244, 114, 182, 0.4); }
        .timer { font-size: 1.5rem; font-weight: 600; font-variant-numeric: tabular-nums; }
        
        .toolbar-left { grid-column: 1; grid-row: 2; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 10px; z-index: 10; overflow-y: auto;}
        .tool-btn { width: 45px; height: 45px; border-radius: 12px; border: none; background: transparent; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; }
        .tool-btn:hover { background: var(--surface); color: white; }
        .tool-btn.active { background: var(--primary); color: white; box-shadow: 0 0 15px rgba(124, 58, 237, 0.5); }
        
        .canvas-container { grid-column: 2; grid-row: 2; position: relative; overflow: hidden; background: #2a2d38; cursor: crosshair; }
        /* The infinite workspace wrapper */
        #workspace { position: absolute; transform-origin: 0 0; box-shadow: 0 0 30px rgba(0,0,0,0.5); background: white; }
        canvas { position: absolute; top: 0; left: 0; }
        
        .toolbar-right { grid-column: 3; grid-row: 2; border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        
        .properties-panel { padding: 15px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; }
        .prop-row { display: flex; align-items: center; gap: 10px; font-size: 0.8rem; }
        .prop-row input[type=range] { flex: 1; accent-color: var(--primary); }
        .color-picker-wrap { display: flex; gap: 10px; align-items: center; margin-top: 5px; }
        input[type="color"] { -webkit-appearance: none; border: none; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; background: none; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid var(--border); border-radius: 8px; }
        .palette { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
        .swatch { width: 25px; height: 25px; border-radius: 5px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
        
        .layers-panel { flex: 1; display: flex; flex-direction: column; padding: 15px; overflow-y: auto; }
        .layer-item { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.3); padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; border: 1px solid transparent; }
        .layer-item.active { border-color: var(--primary); background: rgba(124, 58, 237, 0.1); }
        .layer-item i { color: var(--text-muted); cursor: pointer; transition: 0.2s; }
        .layer-item i:hover { color: white; }

        /* Text Tool Overlay */
        #text-input-overlay { position: absolute; display: none; background: transparent; border: 1px dashed var(--primary); color: white; font-family: 'Poppins'; outline: none; z-index: 100; min-width: 100px; padding: 5px; }

        /* Overlay text */
        .overlay-text { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; font-size: 5rem; font-weight: 800; background: rgba(0,0,0,0.8); z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s; }

        /* --- VOTING VIEW --- */
        .voting-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 40px; }
        .art-display { max-width: 80vw; max-height: 60vh; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); object-fit: contain; background: white; margin-bottom: 30px; border: 4px solid var(--surface); }
        .stars { display: flex; gap: 15px; }
        .star-btn { font-size: 3rem; background: transparent; border: none; color: var(--surface); cursor: pointer; transition: 0.2s; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .star-btn:hover, .star-btn.active { color: #FBBF24; transform: scale(1.2); }
        
        /* --- RESULTS VIEW --- */
        .podium-container { display: flex; align-items: flex-end; justify-content: center; gap: 20px; height: 60vh; margin-top: 50px; }
        .podium-place { display: flex; flex-direction: column; align-items: center; width: 200px; }
        .podium-art { width: 150px; height: 150px; object-fit: cover; border-radius: 12px; border: 4px solid white; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .podium-step { width: 100%; border-radius: 12px 12px 0 0; display: flex; justify-content: center; padding-top: 20px; font-size: 2rem; font-weight: 800; color: white; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .place-1 .podium-step { height: 250px; background: linear-gradient(to top, #FBBF24, #F59E0B); }
        .place-2 .podium-step { height: 180px; background: linear-gradient(to top, #94A3B8, #CBD5E1); }
        .place-3 .podium-step { height: 120px; background: linear-gradient(to top, #B45309, #D97706); }

        /* Minimap */
        #minimap-container { position: absolute; bottom: 20px; right: 20px; width: 150px; height: 100px; background: rgba(0,0,0,0.5); border: 2px solid var(--border); border-radius: 8px; z-index: 50; overflow: hidden;}
        #minimap-canvas { width: 100%; height: 100%; }
        #minimap-viewport { position: absolute; border: 2px solid var(--primary); box-shadow: 0 0 0 999px rgba(0,0,0,0.3); pointer-events: none; }
    </style>
</head>
<body>

    <!-- 1. LOGIN SCREEN -->
    <div id="view-login" class="view active">
        <div class="glass center-container">
            <h1 class="logo"><i class="fa-solid fa-paintbrush"></i> Flash Draw!</h1>
            <p style="margin-bottom: 20px; color: var(--text-muted);">Enter your name to begin.</p>
            <div class="flex-col">
                <input type="text" id="player-name" class="input" placeholder="Nickname" maxlength="12">
                <div class="flex-row">
                    <button class="btn" style="flex:1" onclick="Game.createRoom()"><i class="fa-solid fa-plus"></i> Create Lobby</button>
                    <button class="btn secondary" style="flex:1" onclick="Game.showJoin()"><i class="fa-solid fa-right-to-bracket"></i> Join Room</button>
                </div>
                <div id="join-section" style="display:none; margin-top: 10px;" class="flex-col">
                    <input type="text" id="room-code-input" class="input" placeholder="6-Letter Room Code" maxlength="6" style="text-transform: uppercase;">
                    <button class="btn" onclick="Game.joinRoom()">Join</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. LOBBY SCREEN -->
    <div id="view-lobby" class="view">
        <div class="lobby-layout">
            <!-- Left: Settings -->
            <div class="glass panel">
                <h2><i class="fa-solid fa-gear"></i> Settings</h2>
                <div id="lobby-settings" style="pointer-events: none; opacity: 0.7;">
                    <div class="setting-group">
                        <label>Round Duration (<span id="lbl-time">5</span>m)</label>
                        <input type="range" id="set-time" min="1" max="10" value="5" onchange="Game.updateSettings()">
                    </div>
                    <div class="setting-group">
                        <label>Max Players (<span id="lbl-players">8</span>)</label>
                        <input type="range" id="set-players" min="2" max="16" value="8" onchange="Game.updateSettings()">
                    </div>
                    <div class="setting-group">
                        <label>Voting Time (<span id="lbl-vote">15</span>s)</label>
                        <input type="range" id="set-vote" min="5" max="30" value="15" onchange="Game.updateSettings()">
                    </div>
                </div>
                <p id="owner-notice" style="font-size:0.8rem; color:var(--accent); margin-top:10px; display:none;">You are the room owner.</p>
            </div>

            <!-- Middle: Players -->
            <div class="glass panel">
                <h2><i class="fa-solid fa-users"></i> Lobby: <span id="lobby-code-display" style="color:var(--primary); letter-spacing: 2px;"></span></h2>
                <div class="player-list" id="lobby-players"></div>
                <button class="btn" id="btn-ready" onclick="Game.toggleReady()" style="margin-top:15px; width:100%;">Ready Up</button>
                <button class="btn danger" id="btn-start" onclick="Game.startGame()" style="margin-top:10px; width:100%; display:none;">Start Match</button>
            </div>

            <!-- Right: Chat -->
            <div class="glass panel">
                <h2><i class="fa-solid fa-comments"></i> Chat</h2>
                <div class="chat-box" id="lobby-chat"></div>
                <div class="chat-input">
                    <input type="text" id="lobby-chat-input" class="input" placeholder="Type here..." onkeypress="if(event.key==='Enter') Game.sendChat()">
                    <button class="btn" onclick="Game.sendChat()"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. DRAWING SCREEN -->
    <div id="view-draw" class="view">
        <div class="top-bar glass" style="border-radius: 0;">
            <div class="timer" id="game-timer">05:00</div>
            <div class="theme-display" id="game-theme">THEME</div>
            <button class="btn secondary" onclick="DrawEngine.clearCanvas()"><i class="fa-solid fa-trash"></i></button>
        </div>
        
        <!-- Tools -->
        <div class="toolbar-left glass" style="border-radius: 0;">
            <button class="tool-btn active" title="Pencil (B)" onclick="DrawEngine.setTool('pencil')"><i class="fa-solid fa-pencil"></i></button>
            <button class="tool-btn" title="Marker" onclick="DrawEngine.setTool('marker')"><i class="fa-solid fa-highlighter"></i></button>
            <button class="tool-btn" title="Airbrush" onclick="DrawEngine.setTool('airbrush')"><i class="fa-solid fa-spray-can"></i></button>
            <button class="tool-btn" title="Eraser (E)" onclick="DrawEngine.setTool('eraser')"><i class="fa-solid fa-eraser"></i></button>
            <button class="tool-btn" title="Fill (G)" onclick="DrawEngine.setTool('fill')"><i class="fa-solid fa-fill-drip"></i></button>
            <div style="height:1px; width:60%; background:var(--border); margin:10px 0;"></div>
            <button class="tool-btn" title="Line (L)" onclick="DrawEngine.setTool('line')"><i class="fa-solid fa-minus"></i></button>
            <button class="tool-btn" title="Rectangle (R)" onclick="DrawEngine.setTool('rect')"><i class="fa-solid fa-vector-square"></i></button>
            <button class="tool-btn" title="Circle (C)" onclick="DrawEngine.setTool('circle')"><i class="fa-regular fa-circle"></i></button>
            <div style="height:1px; width:60%; background:var(--border); margin:10px 0;"></div>
            <button class="tool-btn" title="Text (T)" onclick="DrawEngine.setTool('text')"><i class="fa-solid fa-font"></i></button>
            <button class="tool-btn" title="Select/Move" onclick="DrawEngine.setTool('select')"><i class="fa-solid fa-arrows-up-down-left-right"></i></button>
            <button class="tool-btn" title="Pan (Space)" onclick="DrawEngine.setTool('pan')"><i class="fa-solid fa-hand"></i></button>
            <div style="flex:1;"></div>
            <button class="tool-btn" title="Undo (Ctrl+Z)" onclick="DrawEngine.undo()"><i class="fa-solid fa-rotate-left"></i></button>
            <button class="tool-btn" title="Redo (Ctrl+Y)" onclick="DrawEngine.redo()"><i class="fa-solid fa-rotate-right"></i></button>
        </div>
        
        <!-- Canvas Area -->
        <div class="canvas-container" id="canvas-wrap">
            <div id="workspace"></div>
            <div id="minimap-container">
                <canvas id="minimap-canvas"></canvas>
                <div id="minimap-viewport"></div>
            </div>
            <!-- Dynamic text input -->
            <input type="text" id="text-input-overlay" placeholder="Type here...">
        </div>
        
        <!-- Properties & Layers -->
        <div class="toolbar-right glass" style="border-radius: 0;">
            <div class="properties-panel">
                <div class="prop-row">
                    <i class="fa-solid fa-circle" style="font-size:0.8rem"></i>
                    <input type="range" id="brush-size" min="1" max="100" value="5" oninput="DrawEngine.updateProps()">
                    <span id="val-size" style="width:30px; text-align:right;">5</span>
                </div>
                <div class="prop-row">
                    <i class="fa-solid fa-eye-dropper" style="font-size:0.8rem"></i>
                    <input type="range" id="brush-opacity" min="1" max="100" value="100" oninput="DrawEngine.updateProps()">
                    <span id="val-opacity" style="width:30px; text-align:right;">100</span>
                </div>
                <div class="color-picker-wrap">
                    <input type="color" id="color-picker" value="#000000" onchange="DrawEngine.updateProps()">
                    <div style="flex:1; display:flex; gap:5px;" id="quick-colors">
                        <div class="swatch" style="background:#000000;" onclick="DrawEngine.setColor('#000000')"></div>
                        <div class="swatch" style="background:#FFFFFF;" onclick="DrawEngine.setColor('#FFFFFF')"></div>
                        <div class="swatch" style="background:#EF4444;" onclick="DrawEngine.setColor('#EF4444')"></div>
                        <div class="swatch" style="background:#3B82F6;" onclick="DrawEngine.setColor('#3B82F6')"></div>
                        <div class="swatch" style="background:#10B981;" onclick="DrawEngine.setColor('#10B981')"></div>
                    </div>
                </div>
                <div class="palette" id="color-palette">
                    <!-- JS generated palette -->
                </div>
            </div>
            
            <div class="layers-panel">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <h3 style="font-size:1rem;">Layers</h3>
                    <button class="btn" style="padding:4px 8px; font-size:0.8rem;" onclick="DrawEngine.addLayer()"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div id="layer-list" style="display:flex; flex-direction:column-reverse; gap:5px;">
                    <!-- Layers injected here -->
                </div>
            </div>
        </div>
        
        <div id="overlay-msg" class="overlay-text">TIME'S UP!</div>
    </div>

    <!-- 4. VOTING SCREEN -->
    <div id="view-vote" class="view">
        <div class="voting-container">
            <h2 id="vote-title" style="margin-bottom: 20px; font-size: 2rem;">Rate this drawing!</h2>
            <img id="vote-image" class="art-display" src="">
            <div class="stars" id="star-container">
                <button class="star-btn" onclick="Game.submitVote(1)"><i class="fa-solid fa-star"></i></button>
                <button class="star-btn" onclick="Game.submitVote(2)"><i class="fa-solid fa-star"></i></button>
                <button class="star-btn" onclick="Game.submitVote(3)"><i class="fa-solid fa-star"></i></button>
                <button class="star-btn" onclick="Game.submitVote(4)"><i class="fa-solid fa-star"></i></button>
                <button class="star-btn" onclick="Game.submitVote(5)"><i class="fa-solid fa-star"></i></button>
            </div>
            <p id="vote-wait" style="margin-top: 20px; font-size: 1.2rem; color: var(--accent); display:none;">Waiting for others...</p>
        </div>
    </div>

    <!-- 5. RESULTS SCREEN -->
    <div id="view-results" class="view">
        <div class="voting-container">
            <h1 class="logo" style="font-size: 4rem; margin-bottom: 0;">Winners</h1>
            <div class="podium-container" id="podium">
                <!-- Injected via JS -->
            </div>
            <p style="margin-top:40px; color:var(--text-muted);">Returning to lobby...</p>
        </div>
    </div>

    <script>
        const socket = io();

        /* =========================================
           UI NAVIGATION & GENERAL LOGIC
        ========================================= */
        const UI = {
            showView: (id) => {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                if(id === 'view-draw') DrawEngine.resize();
            },
            generatePalette: () => {
                const colors = ['#f87171', '#fb923c', '#fbbf24', '#a3e635', '#4ade80', '#2dd4bf', '#38bdf8', '#818cf8', '#c084fc', '#f472b6', '#0f111a', '#475569', '#94a3b8', '#f8fafc', '#7c2d12'];
                const container = document.getElementById('color-palette');
                colors.forEach(c => {
                    const el = document.createElement('div');
                    el.className = 'swatch';
                    el.style.backgroundColor = c;
                    el.onclick = () => DrawEngine.setColor(c);
                    container.appendChild(el);
                });
            },
            showOverlayMsg: (text, duration) => {
                const el = document.getElementById('overlay-msg');
                el.innerText = text;
                el.style.opacity = 1;
                setTimeout(() => el.style.opacity = 0, duration);
            }
        };

        /* =========================================
           MULTIPLAYER & GAME STATE
        ========================================= */
        const Game = {
            name: '',
            code: '',
            isOwner: false,
            voteTargetId: null,
            timerInterval: null,

            showJoin: () => { document.getElementById('join-section').style.display = 'flex'; },
            
            createRoom: () => {
                const name = document.getElementById('player-name').value.trim() || 'Player';
                Game.name = name;
                socket.emit('create_room', { name });
            },

            joinRoom: () => {
                const name = document.getElementById('player-name').value.trim() || 'Player';
                const code = document.getElementById('room-code-input').value.trim().toUpperCase();
                if(code.length === 6) {
                    Game.name = name;
                    socket.emit('join_room', { code, name });
                }
            },

            toggleReady: () => { socket.emit('toggle_ready', Game.code); },
            
            updateSettings: () => {
                if(!Game.isOwner) return;
                const time = document.getElementById('set-time').value;
                const players = document.getElementById('set-players').value;
                const vote = document.getElementById('set-vote').value;
                document.getElementById('lbl-time').innerText = time;
                document.getElementById('lbl-players').innerText = players;
                document.getElementById('lbl-vote').innerText = vote;
                socket.emit('update_settings', { code: Game.code, settings: { roundTime: time, maxPlayers: players, voteTime: vote }});
            },

            sendChat: () => {
                const input = document.getElementById('lobby-chat-input');
                if(input.value.trim() !== '') {
                    socket.emit('chat_msg', { code: Game.code, msg: input.value.trim() });
                    input.value = '';
                }
            },

            startGame: () => { socket.emit('start_game', Game.code); },

            submitVote: (stars) => {
                if(!Game.voteTargetId) return;
                socket.emit('submit_vote', { code: Game.code, authorId: Game.voteTargetId, stars });
                document.querySelectorAll('.star-btn').forEach((btn, i) => {
                    if(i < stars) btn.style.color = '#FBBF24';
                    else btn.style.color = 'var(--surface)';

        // --- Socket Listeners ---

        socket.on('start_vote', data => {

        socket.on('show_results', top3 => {

            places.forEach(pos => {

                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#7C3AED', '#F472B6', '#FBBF24'] });

        socket.on('return_to_lobby', () => {
            UI.showView('view-lobby');
            document.querySelectorAll('.status').forEach(el => el.classList.remove('ready'));
            // Note: Update players logic will handle the UI state now, so no need to disable btn-start blindly
        });


        /* =========================================
           HIGH PERFORMANCE DRAWING ENGINE
        ========================================= */
        const DrawEngine = {
            width: 1920, // Virtual canvas size
            height: 1080,
            layers: [],
            activeLayer: 0,
            history: [],
            redoStack: [],
            
            // State
            tool: 'pencil',
            color: '#000000',
            size: 5,
            opacity: 1,
            
            // Viewport
            scale: 1,
            panX: 0,
            panY: 0,
            isPanning: false,
            
            // Input state
            isDrawing: false,
            points: [],
            lastRenderPoint: null,
            lastMousePos: null,
            startX: 0, startY: 0,
            
            // Spray Tool
            sprayInterval: null,
            
            // Cheat Menu
            keyBuffer: '',
            
            // DOM
            workspace: document.getElementById('workspace'),
            wrap: document.getElementById('canvas-wrap'),
            minimap: document.getElementById('minimap-canvas'),
            miniCtx: document.getElementById('minimap-canvas').getContext('2d'),
            viewport: document.getElementById('minimap-viewport'),

            init: function() {
                this.workspace.innerHTML = '';
                this.layers = [];
                this.history = [];
                this.redoStack = [];
                this.workspace.style.width = this.width + 'px';
                this.workspace.style.height = this.height + 'px';
                
                // Add default white background layer
                this.addLayer("Background", true);
                this.fillCanvas('#ffffff');
                
                // Add drawing layer
                this.addLayer("Layer 1");

                // Center canvas
                const rect = this.wrap.getBoundingClientRect();
                this.scale = Math.min(rect.width / this.width, rect.height / this.height) * 0.9;
                this.panX = (rect.width - (this.width * this.scale)) / 2;
                this.panY = (rect.height - (this.height * this.scale)) / 2;
                this.updateTransform();

                this.setupEvents();
                this.updateLayerUI();
                this.saveState();
            },

            addLayer: function(name = `Layer ${this.layers.length}`, noTransparent = false) {
                const canvas = document.createElement('canvas');
                canvas.width = this.width;
                canvas.height = this.height;
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                this.workspace.appendChild(canvas);
                
                this.layers.push({ name, canvas, ctx, visible: true, locked: false });
                this.activeLayer = this.layers.length - 1;
                this.updateLayerUI();
            },

            updateLayerUI: function() {
                const list = document.getElementById('layer-list');
                list.innerHTML = '';
                this.layers.forEach((l, i) => {
                    const el = document.createElement('div');
                    el.className = `layer-item ${i === this.activeLayer ? 'active' : ''}`;
                    el.onclick = () => { this.activeLayer = i; this.updateLayerUI(); };
                    el.innerHTML = `
                        <span>${l.name}</span>
                        <div style="display:flex; gap:10px;">
                            <i class="fa-solid fa-eye${l.visible ? '' : '-slash'}" onclick="event.stopPropagation(); DrawEngine.toggleLayerVisibility(${i})"></i>
                        </div>
                    `;
                    list.appendChild(el);
                });
                this.updateMinimap();
            },

            toggleLayerVisibility: function(i) {
                this.layers[i].visible = !this.layers[i].visible;
                this.layers[i].canvas.style.display = this.layers[i].visible ? 'block' : 'none';
                this.updateLayerUI();
            },

            updateTransform: function() {
                this.workspace.style.transform = `translate(${this.panX}px, ${this.panY}px) scale(${this.scale})`;
                
                // Update Minimap viewport
                const mw = this.minimap.width;
                const mh = this.minimap.height;
                const rect = this.wrap.getBoundingClientRect();
                
                const viewW = (rect.width / this.scale) * (mw / this.width);
                const viewH = (rect.height / this.scale) * (mh / this.height);
                const viewX = (-this.panX / this.scale) * (mw / this.width);
                const viewY = (-this.panY / this.scale) * (mh / this.height);

                this.viewport.style.width = `${viewW}px`;
                this.viewport.style.height = `${viewH}px`;
                this.viewport.style.left = `${viewX}px`;
                this.viewport.style.top = `${viewY}px`;
            },

            updateMinimap: function() {
                this.minimap.width = 150;
                this.minimap.height = 150 * (this.height / this.width);
                this.miniCtx.clearRect(0,0, this.minimap.width, this.minimap.height);
                this.layers.forEach(l => {
                    if(l.visible) {
                        this.miniCtx.drawImage(l.canvas, 0, 0, this.minimap.width, this.minimap.height);
                    }
                });
            },

            // Coordinate Mapping
            getMousePos: function(e) {
                const rect = this.workspace.getBoundingClientRect();
                return {
                    x: (e.clientX - rect.left) / this.scale,
                    y: (e.clientY - rect.top) / this.scale
                };
            },

            setupEvents: function() {
                // Prevent duplicate listener bindings
                this.wrap.onpointerdown = this.handlePointerDown.bind(this);
                window.onpointermove = this.handlePointerMove.bind(this);
                window.onpointerup = this.handlePointerUp.bind(this);
                
                this.wrap.onwheel = (e) => {
                    e.preventDefault();
                    const zoomSensitivity = 0.001;
                    const delta = -e.deltaY * zoomSensitivity;
                    const oldScale = this.scale;
                    this.scale = Math.min(Math.max(0.1, this.scale + delta), 5);
                    
                    // Zoom to mouse
                    const rect = this.wrap.getBoundingClientRect();
                    const mouseX = e.clientX - rect.left;
                    const mouseY = e.clientY - rect.top;
                    
                    this.panX = mouseX - (mouseX - this.panX) * (this.scale / oldScale);
                    this.panY = mouseY - (mouseY - this.panY) * (this.scale / oldScale);
                    
                    this.updateTransform();
                };

                // Keyboard Shortcuts & Cheat Menu Tracker
                this.keyBuffer = '';
                
                window.onkeydown = (e) => {
                    if(e.target.tagName === 'INPUT') return;
                    
                    // Cheat Menu tracking logic
                    this.keyBuffer += e.key.toLowerCase();
                    if(this.keyBuffer.length > 5) this.keyBuffer = this.keyBuffer.slice(-5);
                    if(this.keyBuffer === 'chess') {
                        const url = prompt("🚨 CHEAT MENU UNLOCKED! 🚨\nEnter an Image URL to auto-draw it onto the canvas:");
                        if(url) {
                            const img = new Image();
                            img.crossOrigin = "Anonymous"; // Allows cross origin drawing
                            img.onload = () => {
                                const layer = this.layers[this.activeLayer];
                                layer.ctx.drawImage(img, 0, 0, this.width, this.height);
                                this.saveState();
                                this.updateMinimap();
                            };
                            img.onerror = () => alert("Could not load image! Ensure it is a direct image URL.");
                            img.src = url;
                        }
                        this.keyBuffer = ''; // reset buffer
                    }

                    if(e.code === 'Space') { this.isPanning = true; this.wrap.style.cursor = 'grab'; }
                    if(e.ctrlKey && e.code === 'KeyZ') this.undo();
                    if(e.ctrlKey && e.code === 'KeyY') this.redo();
                    if(e.code === 'KeyB') this.setTool('pencil');
                    if(e.code === 'KeyE') this.setTool('eraser');
                    if(e.code === 'KeyG') this.setTool('fill');
                };
                window.onkeyup = (e) => {
                    if(e.code === 'Space') { this.isPanning = false; this.wrap.style.cursor = 'crosshair'; }
                };
            },

            // Core Drawing Logic
            handlePointerDown: function(e) {
                if(e.button === 1 || this.isPanning || this.tool === 'pan') {
                    this.isPanning = true;
                    this.startX = e.clientX - this.panX;
                    this.startY = e.clientY - this.panY;
                    this.wrap.style.cursor = 'grabbing';
                    return;
                }

                if(this.tool === 'text') return this.handleTextTool(e);

                this.isDrawing = true;
                const pos = this.getMousePos(e);
                this.startX = pos.x;
                this.startY = pos.y;
                this.points = [pos];
                this.lastRenderPoint = pos;
                this.lastMousePos = pos;

                const layer = this.layers[this.activeLayer];
                if(layer.locked || !layer.visible) return;

                const ctx = layer.ctx;
                ctx.globalAlpha = this.opacity;
                ctx.lineWidth = this.size;
                ctx.strokeStyle = this.color;
                ctx.fillStyle = this.color;

                // Tool specific setup
                if(this.tool === 'eraser') {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.strokeStyle = 'rgba(0,0,0,1)';
                } else if(this.tool === 'marker') {
                    ctx.globalCompositeOperation = 'multiply';
                    ctx.globalAlpha = this.opacity * 0.5;
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                }

                if(this.tool === 'fill') {
                    this.floodFill(Math.floor(pos.x), Math.floor(pos.y));
                    this.isDrawing = false;
                    this.saveState();
                } else if(['rect', 'circle', 'line'].includes(this.tool)) {
                    // Save canvas state for shape preview
                    this.previewData = ctx.getImageData(0,0, this.width, this.height);
                } else if(this.tool === 'airbrush') {
                    // AIRBRUSH: Start continuous spray timer
                    if(this.sprayInterval) clearInterval(this.sprayInterval);
                    this.sprayInterval = setInterval(() => {
                        if(!this.isDrawing || !this.lastMousePos) return;
                        
                        const density = Math.max(5, this.size * 1.5); // Number of particles
                        ctx.fillStyle = this.color;
                        
                        for(let i=0; i<density; i++) {
                            // Scatter randomly within a circular radius
                            const radius = (this.size / 1.5) * Math.sqrt(Math.random());
                            const angle = Math.random() * 2 * Math.PI;
                            const x = this.lastMousePos.x + radius * Math.cos(angle);
                            const y = this.lastMousePos.y + radius * Math.sin(angle);
                            
                            // Draw individual 1x1 pixel dots
                            ctx.globalAlpha = this.opacity * 0.8;
                            ctx.fillRect(x, y, 1, 1); 
                        }
                    }, 15);
                } else {
                    // Start drawing regular path
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, this.size/2, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(pos.x, pos.y);
                }
            },

            handlePointerMove: function(e) {
                if(this.isPanning) {
                    this.panX = e.clientX - this.startX;
                    this.panY = e.clientY - this.startY;
                    this.updateTransform();
                    return;
                }
                
                if(!this.isDrawing) return;

                const pos = this.getMousePos(e);
                this.lastMousePos = pos; // Track mouse location so interval can spray here
                
                const layer = this.layers[this.activeLayer];
                const ctx = layer.ctx;

                if(['rect', 'circle', 'line'].includes(this.tool)) {
                    // Shape previews
                    ctx.putImageData(this.previewData, 0, 0);
                    ctx.beginPath();
                    if(this.tool === 'rect') {
                        ctx.rect(this.startX, this.startY, pos.x - this.startX, pos.y - this.startY);
                    } else if(this.tool === 'circle') {
                        const r = Math.sqrt(Math.pow(pos.x - this.startX, 2) + Math.pow(pos.y - this.startY, 2));
                        ctx.arc(this.startX, this.startY, r, 0, Math.PI*2);
                    } else if(this.tool === 'line') {
                        ctx.moveTo(this.startX, this.startY);
                        ctx.lineTo(pos.x, pos.y);
                    }
                    ctx.stroke();
                } else {
                    this.points.push(pos);
                    
                    if(this.tool === 'airbrush') return; // Skip line drawing for airbrush

                    // Smooth Freehand Drawing (Quadratic Curve Interpolation)
                    if(this.points.length >= 3) {
                        const lastTwo = this.points.slice(-2);
                        const control = lastTwo[0];
                        const end = {
                            x: (lastTwo[0].x + lastTwo[1].x) / 2,
                            y: (lastTwo[0].y + lastTwo[1].y) / 2
                        };
                        
                        ctx.beginPath();
                        ctx.moveTo(this.lastRenderPoint.x, this.lastRenderPoint.y);
                        ctx.quadraticCurveTo(control.x, control.y, end.x, end.y);
                        ctx.stroke();
                        
                        this.lastRenderPoint = end;
                    }
                }
            },

            handlePointerUp: function(e) {
                if(this.isPanning && e.button !== 1 && this.tool !== 'pan') this.isPanning = false;
                
                // Clear airbrush spray loop
                if(this.sprayInterval) {
                    clearInterval(this.sprayInterval);
                    this.sprayInterval = null;
                }
                
                if(!this.isDrawing) return;
                this.isDrawing = false;
                
                const layer = this.layers[this.activeLayer];
                const ctx = layer.ctx;
                
                if(['rect', 'circle', 'line'].includes(this.tool)) {
                    // Finalize shape
                    ctx.stroke();
                } else if(!['airbrush'].includes(this.tool) && this.points.length > 0) {
                    // Finish final segment
                    ctx.beginPath();
                    ctx.moveTo(this.lastRenderPoint.x, this.lastRenderPoint.y);
                    ctx.lineTo(this.points[this.points.length-1].x, this.points[this.points.length-1].y);
                    ctx.stroke();
                }

                ctx.globalCompositeOperation = 'source-over'; // Reset
                this.updateMinimap();
                this.saveState();
            },

            handleTextTool: function(e) {
                const pos = this.getMousePos(e);
                const input = document.getElementById('text-input-overlay');
                input.style.display = 'block';
                input.style.left = e.clientX + 'px';
                input.style.top = e.clientY + 'px';
                input.style.fontSize = (this.size * this.scale) + 'px';
                input.style.color = this.color;
                input.value = '';
                input.focus();

                input.onblur = () => {
                    if(input.value.trim() !== '') {
                        const ctx = this.layers[this.activeLayer].ctx;
                        ctx.font = `${this.size}px Poppins`;
                        ctx.fillStyle = this.color;
                        ctx.globalAlpha = this.opacity;
                        ctx.fillText(input.value, pos.x, pos.y + this.size);
                        this.saveState();
                        this.updateMinimap();
                    }
                    input.style.display = 'none';
                };
                input.onkeydown = (ev) => { if(ev.key === 'Enter') input.blur(); };
            },

            // State Management
            saveState: function() {
                const state = [];
                this.layers.forEach(l => {
                    state.push(l.ctx.getImageData(0,0,this.width,this.height));
                });
                this.history.push(state);
                if(this.history.length > 20) this.history.shift(); // Limit undo size
                this.redoStack = [];
            },

            undo: function() {
                if(this.history.length > 1) {
                    this.redoStack.push(this.history.pop());
                    const state = this.history[this.history.length - 1];
                    state.forEach((imgData, i) => {
                        this.layers[i].ctx.putImageData(imgData, 0, 0);
                    });
                    this.updateMinimap();
                }
            },

            redo: function() {
                if(this.redoStack.length > 0) {
                    const state = this.redoStack.pop();
                    state.forEach((imgData, i) => {
                        this.layers[i].ctx.putImageData(imgData, 0, 0);
                    });
                    this.history.push(state);
                    this.updateMinimap();
                }
            },

            // Flood Fill Algorithm
            floodFill: function(startX, startY) {
                const layer = this.layers[this.activeLayer];
                const ctx = layer.ctx;
                const w = this.width, h = this.height;
                const imgData = ctx.getImageData(0,0,w,h);
                const data = imgData.data;

                const getPixelIndex = (x,y) => (y * w + x) * 4;
                const startIdx = getPixelIndex(startX, startY);
                const startR = data[startIdx], startG = data[startIdx+1], startB = data[startIdx+2], startA = data[startIdx+3];

                // Convert hex color to rgb
                const hex = this.color.replace('#','');
                const fillR = parseInt(hex.substring(0,2), 16);
                const fillG = parseInt(hex.substring(2,4), 16);
                const fillB = parseInt(hex.substring(4,6), 16);

                if(startR === fillR && startG === fillG && startB === fillB && startA === 255) return;

                const matchStartColor = (idx) => {
                    return data[idx] === startR && data[idx+1] === startG && data[idx+2] === startB && data[idx+3] === startA;
                };

                const setPixel = (idx) => {
                    data[idx] = fillR; data[idx+1] = fillG; data[idx+2] = fillB; data[idx+3] = 255;
                };

                const pixelStack = [[startX, startY]];
                while(pixelStack.length > 0) {
                    let newPos = pixelStack.pop();
                    let x = newPos[0], y = newPos[1];
                    let idx = getPixelIndex(x, y);
                    
                    while(y-- >= 0 && matchStartColor(idx)) idx -= w*4;
                    idx += w*4; ++y;
                    
                    let reachLeft = false, reachRight = false;
                    while(y++ < h-1 && matchStartColor(idx)) {
                        setPixel(idx);
                        if(x > 0) {
                            if(matchStartColor(idx - 4)) {
                                if(!reachLeft) { pixelStack.push([x-1, y]); reachLeft = true; }
                            } else if(reachLeft) reachLeft = false;
                        }
                        if(x < w-1) {
                            if(matchStartColor(idx + 4)) {
                                if(!reachRight) { pixelStack.push([x+1, y]); reachRight = true; }
                            } else if(reachRight) reachRight = false;
                        }
                        idx += w*4;
                    }
                }
                ctx.putImageData(imgData, 0, 0);
            },

            // UI Callbacks
            setTool: function(t) {
                this.tool = t;
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                event.currentTarget.classList.add('active');
                this.wrap.style.cursor = t === 'pan' ? 'grab' : (t === 'text' ? 'text' : 'crosshair');
            },
            
            setColor: function(c) {
                this.color = c;
                document.getElementById('color-picker').value = c;
            },
            
            updateProps: function() {
                this.size = parseInt(document.getElementById('brush-size').value);
                this.opacity = parseInt(document.getElementById('brush-opacity').value) / 100;
                this.color = document.getElementById('color-picker').value;
                document.getElementById('val-size').innerText = this.size;
                document.getElementById('val-opacity').innerText = Math.round(this.opacity*100);
            },

            clearCanvas: function() {
                const ctx = this.layers[this.activeLayer].ctx;
                ctx.clearRect(0,0,this.width,this.height);
                if(this.activeLayer === 0) this.fillCanvas('#ffffff');
                this.saveState();
                this.updateMinimap();
            },

            fillCanvas: function(color) {
                const ctx = this.layers[this.activeLayer].ctx;
                ctx.fillStyle = color;
                ctx.fillRect(0,0,this.width,this.height);
            },

            resize: function() {
                if(this.workspace) this.updateTransform();
            },

            getFinalImage: function() {
                // Composite all visible layers
                const comp = document.createElement('canvas');
                comp.width = this.width; comp.height = this.height;
                const ctx = comp.getContext('2d');
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0,0,this.width,this.height);
                
                this.layers.forEach(l => {
                    if(l.visible) ctx.drawImage(l.canvas, 0, 0);
                });
                
                // Downscale for network transmission (saving bandwidth)
                const out = document.createElement('canvas');
                out.width = 1280; out.height = 720;
                const outCtx = out.getContext('2d');
                outCtx.drawImage(comp, 0, 0, 1280, 720);
                
                return out.toDataURL('image/jpeg', 0.85);
            }
        };

        // Window Resizing handler
        window.addEventListener('resize', () => DrawEngine.resize());

        // Initialize UI components
        UI.generatePalette();
        
    </script>
</body>
</html>
