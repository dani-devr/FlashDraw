<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flash Draw!</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg-color: #0b132b;
            --panel-bg: #1c2541;
            --panel-bg-hover: #3a506b;
            --border-color: #3a506b;
            --text-main: #ffffff;
            --text-muted: #8d99ae;
            --primary: #3a86ff;
            --primary-hover: #00509d;
            --accent: #ff006e;
            --success: #06d6a0;
            --danger: #ef233c;
            --warning: #ffd166;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Nunito', sans-serif; user-select: none; }
        
        body { 
            background-color: var(--bg-color); color: var(--text-main); 
            overflow: hidden; height: 100vh; width: 100vw; display: flex; flex-direction: column; 
        }

        /* UI Elements */
        h1, h2, h3 { text-transform: uppercase; letter-spacing: 1px; font-weight: 900; }
        
        .btn { 
            background: var(--primary); color: white; border: none; padding: 14px 24px; border-radius: 12px; 
            font-size: 1.2rem; font-weight: 900; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 6px 0 var(--primary-hover); transition: 0.1s; display: inline-flex; align-items: center; justify-content: center; gap: 10px; width: 100%;
        }
        .btn:active { box-shadow: 0 0px 0 var(--primary-hover); transform: translateY(6px); }
        .btn.green { background: var(--success); box-shadow: 0 6px 0 #04a077; }
        .btn.red { background: var(--danger); box-shadow: 0 6px 0 #ba1826; }
        
        .input { 
            background: var(--bg-color); color: var(--text-main); border: 3px solid var(--border-color); 
            padding: 14px; border-radius: 12px; font-size: 1.2rem; font-weight: 800; outline: none; width: 100%; text-align: center; transition: 0.2s;
        }
        .input:focus { border-color: var(--primary); }

        .panel { 
            background: var(--panel-bg); border: 3px solid var(--border-color); border-radius: 20px; 
            padding: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .view { display: none; height: 100%; width: 100%; position: absolute; top: 0; left: 0; flex-direction: column; align-items: center; justify-content: center;}
        .view.active { display: flex; animation: fadeIn 0.3s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* --- MENUS --- */
        .logo { font-size: 5rem; color: var(--text-main); text-shadow: 0 6px 0 var(--primary), 0 12px 25px rgba(0,0,0,0.5); margin-bottom: 30px; text-align: center; }
        .center-box { max-width: 500px; width: 90%; text-align: center; }
        
        .lobby-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; max-width: 1000px; width: 95%; height: 75vh; }
        .player-list { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; max-height: 50vh; margin-top: 15px;}
        .player-card { background: var(--panel-bg-hover); padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 1.2rem; border-left: 6px solid var(--danger); }
        .player-card.ready { border-left-color: var(--success); }

        .setting-row { display: flex; justify-content: space-between; align-items: center; background: var(--bg-color); padding: 12px; border-radius: 10px; margin-bottom: 12px; font-weight: 800;}
        .setting-row input[type=range] { width: 130px; accent-color: var(--primary); }

        /* --- DRAWING UI (Advanced & Visible) --- */
        #view-draw { display: none; grid-template-columns: 90px 1fr 280px; grid-template-rows: 70px 1fr; height: 100vh; background: var(--bg-color); }
        #view-draw.active { display: grid; }
        
        /* Top Bar */
        .top-bar { grid-column: 1 / 4; grid-row: 1; background: var(--panel-bg); border-bottom: 3px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 50; }
        .theme-display { font-size: 2rem; font-weight: 900; color: var(--warning); text-shadow: 0 3px 0 rgba(0,0,0,0.5); letter-spacing: 2px;}
        .timer { font-size: 2rem; font-weight: 900; background: var(--bg-color); padding: 5px 20px; border-radius: 12px; border: 2px solid var(--border-color); }

        /* Left Toolbar */
        .toolbar-left { grid-column: 1; grid-row: 2; background: var(--panel-bg); border-right: 3px solid var(--border-color); display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 10px; z-index: 40; overflow-y: auto;}
        .tool-btn { width: 60px; height: 60px; border-radius: 15px; border: 3px solid transparent; background: var(--panel-bg-hover); color: var(--text-main); font-size: 1.5rem; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; position: relative;}
        .tool-btn:hover { background: var(--primary); }
        .tool-btn.active { background: var(--primary); border-color: white; box-shadow: 0 0 15px rgba(58, 134, 255, 0.6); }
        .shortcut { position: absolute; bottom: 2px; right: 4px; font-size: 0.7rem; font-weight: 900; opacity: 0.7; }
        .tool-divider { height: 3px; width: 60%; background: var(--border-color); margin: 5px 0; }

        /* Canvas Workspace (Pan/Zoom supported) */
        .canvas-area { grid-column: 2; grid-row: 2; position: relative; overflow: hidden; background: #070b19; cursor: crosshair; }
        #workspace { position: absolute; transform-origin: 0 0; background: white; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        canvas { position: absolute; top: 0; left: 0; }
        
        #done-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(11, 19, 43, 0.9); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }

        /* Right Panel (Properties & Layers) */
        .toolbar-right { grid-column: 3; grid-row: 2; background: var(--panel-bg); border-left: 3px solid var(--border-color); display: flex; flex-direction: column; z-index: 40; }
        
        .prop-section { padding: 20px; border-bottom: 3px solid var(--border-color); }
        .prop-section h3 { margin-bottom: 15px; font-size: 1rem; color: var(--text-muted); }
        .slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .slider-row input[type=range] { flex: 1; accent-color: var(--primary); height: 8px; }
        .slider-val { background: var(--bg-color); padding: 4px 8px; border-radius: 6px; font-weight: 800; min-width: 45px; text-align: center; }
        
        .color-picker-row { display: flex; gap: 10px; margin-bottom: 15px; }
        input[type="color"] { -webkit-appearance: none; border: 3px solid var(--border-color); width: 50px; height: 50px; border-radius: 12px; cursor: pointer; background: none; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 8px; }
        
        .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .swatch { aspect-ratio: 1; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: 0.1s; }
        .swatch:hover, .swatch.active { border-color: white; transform: scale(1.1); }

        .layers-section { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .layer-card { background: var(--bg-color); border: 2px solid var(--border-color); padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .layer-card.active { border-color: var(--primary); background: rgba(58, 134, 255, 0.2); }
        .layer-card i { cursor: pointer; color: var(--text-muted); transition: 0.2s; }
        .layer-card i:hover { color: white; }

        /* --- VOTING & RESULTS --- */
        .vote-img-box { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin: 30px 0; max-width: 900px; width: 90%; }
        .vote-img { width: 100%; border-radius: 10px; object-fit: contain; max-height: 60vh; }
        .stars { display: flex; gap: 15px; }
        .star-btn { font-size: 5rem; color: var(--panel-bg-hover); background: none; border: none; cursor: pointer; transition: 0.2s; text-shadow: 0 5px 0 rgba(0,0,0,0.3); }
        .star-btn:hover, .star-btn.active { color: var(--warning); transform: scale(1.1); }

        .podium { display: flex; align-items: flex-end; justify-content: center; gap: 20px; height: 50vh; margin-top: 40px; }
        .podium-place { display: flex; flex-direction: column; align-items: center; width: 250px; }
        .podium-art { width: 100%; aspect-ratio: 4/3; object-fit: cover; border: 6px solid white; border-radius: 15px; margin-bottom: -15px; z-index: 2; box-shadow: 0 10px 30px rgba(0,0,0,0.6); background: white;}
        .podium-step { width: 100%; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; align-items: center; padding-top: 30px; color: var(--bg-color); font-weight: 900; font-size: 2.5rem; }
        .place-1 .podium-step { height: 280px; background: var(--warning); }
        .place-2 .podium-step { height: 200px; background: #ced4da; }
        .place-3 .podium-step { height: 140px; background: #e29578; }
    </style>
</head>
<body>

    <!-- 1. LOGIN SCREEN -->
    <div id="view-login" class="view active">
        <h1 class="logo"><i class="fa-solid fa-paintbrush"></i> FLASH DRAW!</h1>
        <div class="panel center-box">
            <h2>ENTER NICKNAME</h2>
            <input type="text" id="player-name" class="input" placeholder="Your Name" maxlength="12" style="margin: 20px 0;">
            <button class="btn green" onclick="Game.createRoom()" style="margin-bottom: 15px;"><i class="fa-solid fa-plus"></i> CREATE LOBBY</button>
            <div style="display:flex; gap:10px;">
                <input type="text" id="room-code-input" class="input" placeholder="CODE" maxlength="6" style="text-transform: uppercase;">
                <button class="btn" onclick="Game.joinRoom()"><i class="fa-solid fa-arrow-right"></i> JOIN</button>
            </div>
        </div>
    </div>

    <!-- 2. LOBBY SCREEN -->
    <div id="view-lobby" class="view">
        <h1 class="logo" style="font-size: 3.5rem; margin-bottom: 15px;">ROOM: <span id="lobby-code" style="color:var(--success)"></span></h1>
        <div class="lobby-grid">
            <div class="panel" style="display:flex; flex-direction:column;">
                <h2><i class="fa-solid fa-gear"></i> SETTINGS</h2>
                <div id="settings-area" style="margin-top:20px; opacity:0.5; pointer-events:none;">
                    <div class="setting-row">
                        <span>Time (<span id="lbl-time">3</span>m)</span>
                        <input type="range" id="set-time" min="1" max="10" value="3" onchange="Game.updateSettings()">
                    </div>
                    <div class="setting-row">
                        <span>Players (<span id="lbl-players">8</span>)</span>
                        <input type="range" id="set-players" min="2" max="16" value="8" onchange="Game.updateSettings()">
                    </div>
                </div>
            </div>
            <div class="panel" style="display:flex; flex-direction:column;">
                <h2><i class="fa-solid fa-users"></i> PLAYERS</h2>
                <div class="player-list" id="player-list"></div>
                <div style="margin-top:auto; padding-top:20px; display:flex; gap:15px;">
                    <button class="btn green" id="btn-ready" onclick="Game.toggleReady()">READY UP</button>
                    <button class="btn red" id="btn-start" onclick="Game.startGame()" style="display:none;">START MATCH</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. DRAWING SCREEN (ADVANCED) -->
    <div id="view-draw" class="view">
        <div class="top-bar">
            <div class="timer" id="game-timer">00:00</div>
            <div class="theme-display" id="game-theme">THEME</div>
            <button class="btn green" id="btn-done" style="width: auto;" onclick="Game.submitEarly()">
                <i class="fa-solid fa-check"></i> DONE!
            </button>
        </div>

        <div class="toolbar-left">
            <button class="tool-btn active" title="Pencil (B)" onclick="DrawEngine.setTool('pencil')" id="tool-pencil">
                <i class="fa-solid fa-pencil"></i><span class="shortcut">B</span>
            </button>
            <button class="tool-btn" title="Marker" onclick="DrawEngine.setTool('marker')" id="tool-marker">
                <i class="fa-solid fa-highlighter"></i>
            </button>
            <button class="tool-btn" title="Airbrush" onclick="DrawEngine.setTool('airbrush')" id="tool-airbrush">
                <i class="fa-solid fa-spray-can"></i>
            </button>
            <button class="tool-btn" title="Eraser (E)" onclick="DrawEngine.setTool('eraser')" id="tool-eraser">
                <i class="fa-solid fa-eraser"></i><span class="shortcut">E</span>
            </button>
            <button class="tool-btn" title="Fill (G)" onclick="DrawEngine.setTool('fill')" id="tool-fill">
                <i class="fa-solid fa-fill-drip"></i><span class="shortcut">G</span>
            </button>
            
            <div class="tool-divider"></div>
            
            <button class="tool-btn" title="Line (L)" onclick="DrawEngine.setTool('line')" id="tool-line">
                <i class="fa-solid fa-minus"></i><span class="shortcut">L</span>
            </button>
            <button class="tool-btn" title="Rectangle (R)" onclick="DrawEngine.setTool('rect')" id="tool-rect">
                <i class="fa-regular fa-square"></i><span class="shortcut">R</span>
            </button>
            <button class="tool-btn" title="Circle (C)" onclick="DrawEngine.setTool('circle')" id="tool-circle">
                <i class="fa-regular fa-circle"></i><span class="shortcut">C</span>
            </button>
            
            <div class="tool-divider"></div>
            
            <button class="tool-btn" title="Pan (Space)" onclick="DrawEngine.setTool('pan')" id="tool-pan">
                <i class="fa-solid fa-hand"></i><span class="shortcut">✋</span>
            </button>
            <button class="tool-btn" title="Undo (Ctrl+Z)" onclick="DrawEngine.undo()">
                <i class="fa-solid fa-rotate-left"></i><span class="shortcut">Z</span>
            </button>
            <button class="tool-btn" title="Clear Canvas" onclick="DrawEngine.clearCanvas()" style="background:var(--danger); margin-top:auto;">
                <i class="fa-solid fa-trash"></i>
            </button>
        </div>

        <div class="canvas-area" id="canvas-wrap">
            <div id="workspace"></div>
            
            <div id="done-overlay">
                <i class="fa-solid fa-circle-check" style="font-size: 6rem; color: var(--success); margin-bottom: 20px;"></i>
                <h1>SUBMITTED!</h1>
                <h2 style="color:var(--text-muted); margin-top:10px;">Waiting for other players...</h2>
            </div>
        </div>

        <div class="toolbar-right">
            <div class="prop-section">
                <h3>BRUSH SETTINGS</h3>
                <div class="slider-row">
                    <i class="fa-solid fa-circle" style="font-size:0.8rem"></i>
                    <input type="range" id="prop-size" min="1" max="150" value="8" oninput="DrawEngine.updateProps()">
                    <div class="slider-val" id="val-size">8</div>
                </div>
                <div class="slider-row">
                    <i class="fa-solid fa-eye-dropper" style="font-size:0.8rem"></i>
                    <input type="range" id="prop-opacity" min="1" max="100" value="100" oninput="DrawEngine.updateProps()">
                    <div class="slider-val" id="val-opacity">100</div>
                </div>
            </div>
            
            <div class="prop-section">
                <h3>COLORS</h3>
                <div class="color-picker-row">
                    <input type="color" id="color-picker" value="#000000" onchange="DrawEngine.updateProps()">
                    <button class="btn" style="padding:10px; flex:1; font-size:1rem;" onclick="DrawEngine.setColor('#FFFFFF')">WHITE</button>
                </div>
                <div class="palette-grid" id="color-palette"></div>
            </div>
            
            <div class="layers-section">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3>LAYERS</h3>
                    <button class="btn" style="padding:6px 12px; width:auto;" onclick="DrawEngine.addLayer()"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div id="layer-list" style="display:flex; flex-direction:column-reverse; gap:8px;"></div>
            </div>
        </div>
    </div>

    <!-- 4. VOTING SCREEN -->
    <div id="view-vote" class="view">
        <h1 id="vote-title" style="font-size: 3rem;">RATE THIS DRAWING!</h1>
        <div class="vote-img-box">
            <img id="vote-image" class="vote-img" src="">
        </div>
        <div class="stars" id="star-container">
            <button class="star-btn" onclick="Game.submitVote(1)"><i class="fa-solid fa-star"></i></button>
            <button class="star-btn" onclick="Game.submitVote(2)"><i class="fa-solid fa-star"></i></button>
            <button class="star-btn" onclick="Game.submitVote(3)"><i class="fa-solid fa-star"></i></button>
            <button class="star-btn" onclick="Game.submitVote(4)"><i class="fa-solid fa-star"></i></button>
            <button class="star-btn" onclick="Game.submitVote(5)"><i class="fa-solid fa-star"></i></button>
        </div>
    </div>

    <!-- 5. RESULTS SCREEN -->
    <div id="view-results" class="view">
        <h1 style="font-size: 4rem; color:var(--success); text-shadow: 0 5px 0 #04a077;">WINNERS!</h1>
        <div class="podium" id="podium-container"></div>
    </div>

    <script>
        const socket = io();

        /* =========================================
           UI GENERATION & GAME LOGIC
        ========================================= */
        const UI = {
            showView: (id) => {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                if(id === 'view-draw') DrawEngine.resize();
            },
            initColors: () => {
                const colors = [
                    '#000000', '#4a4a4a', '#ff0000', '#ff7f00', '#ffff00', 
                    '#00ff00', '#0000ff', '#4b0082', '#9400d3', '#ff1493',
                    '#8b4513', '#d2691e', '#20b2aa', '#00ced1', '#1e90ff'
                ];
                const grid = document.getElementById('color-palette');
                colors.forEach(c => {
                    const el = document.createElement('div');
                    el.className = 'swatch';
                    el.style.backgroundColor = c;
                    el.onclick = () => DrawEngine.setColor(c);
                    grid.appendChild(el);
                });
            }
        };

        const Game = {
            code: '', isOwner: false, voteTargetId: null, timerInterval: null, hasSubmitted: false,

            createRoom: () => socket.emit('create_room', { name: document.getElementById('player-name').value.trim() || 'Player' }),
            joinRoom: () => {
                const code = document.getElementById('room-code-input').value.trim().toUpperCase();
                if(code.length === 6) socket.emit('join_room', { code, name: document.getElementById('player-name').value.trim() || 'Player' });
            },
            toggleReady: () => socket.emit('toggle_ready', Game.code),
            updateSettings: () => {
                if(!Game.isOwner) return;
                const set = { roundTime: document.getElementById('set-time').value, maxPlayers: document.getElementById('set-players').value, voteTime: 10 };
                document.getElementById('lbl-time').innerText = set.roundTime;
                document.getElementById('lbl-players').innerText = set.maxPlayers;
                socket.emit('update_settings', { code: Game.code, settings: set });
            },
            startGame: () => socket.emit('start_game', Game.code),
            
            submitEarly: () => {
                if(Game.hasSubmitted) return;
                Game.hasSubmitted = true;
                document.getElementById('done-overlay').style.display = 'flex';
                socket.emit('submit_drawing', { code: Game.code, image: DrawEngine.getFinalImage() });
            },
            submitVote: (stars) => {
                if(!Game.voteTargetId) return;
                socket.emit('submit_vote', { code: Game.code, authorId: Game.voteTargetId, stars });
                document.querySelectorAll('.star-btn').forEach((btn, i) => {
                    btn.style.color = i < stars ? 'var(--warning)' : 'var(--panel-bg-hover)';
                    btn.style.pointerEvents = 'none';
                });
            }
        };

        socket.on('error_msg', msg => alert(msg));
        socket.on('room_joined', data => {
            Game.code = data.code; Game.isOwner = data.isOwner;
            document.getElementById('lobby-code').innerText = data.code;
            UI.showView('view-lobby');
            if(Game.isOwner) {
                document.getElementById('settings-area').style.pointerEvents = 'auto';
                document.getElementById('settings-area').style.opacity = 1;
                document.getElementById('btn-start').style.display = 'block';
                document.getElementById('btn-ready').style.display = 'none';
            }
        });

        socket.on('update_players', players => {
            const list = document.getElementById('player-list');
            list.innerHTML = '';
            let allReady = true;
            players.forEach(p => {
                if(!p.ready) allReady = false;
                list.innerHTML += `<div class="player-card ${p.ready ? 'ready' : ''}"><span>${p.name} ${p.id === socket.id ? '(YOU)' : ''}</span><i class="fa-solid fa-${p.ready ? 'check' : 'xmark'}" style="color:var(--${p.ready ? 'success' : 'danger'})"></i></div>`;
            });
            if(Game.isOwner && players.length > 1) document.getElementById('btn-start').disabled = !allReady;
        });

        socket.on('game_started', data => {
            UI.showView('view-draw');
            document.getElementById('game-theme').innerText = data.theme;
            Game.hasSubmitted = false;
            document.getElementById('done-overlay').style.display = 'none';
            
            DrawEngine.init();

            let timeLeft = data.time;
            clearInterval(Game.timerInterval);
            Game.timerInterval = setInterval(() => {
                timeLeft--;
                const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
                const s = (timeLeft % 60).toString().padStart(2, '0');
                document.getElementById('game-timer').innerText = `${m}:${s}`;
            }, 1000);
        });

        socket.on('force_submit', () => {
            clearInterval(Game.timerInterval);
            if(!Game.hasSubmitted) Game.submitEarly();
        });

        socket.on('start_vote', data => {
            clearInterval(Game.timerInterval);
            UI.showView('view-vote');
            Game.voteTargetId = data.authorId;
            document.getElementById('vote-image').src = data.image;
            
            const title = document.getElementById('vote-title');
            if(data.authorId === socket.id) {
                title.innerText = "YOUR MASTERPIECE!";
                document.getElementById('star-container').style.display = 'none';
            } else {
                title.innerText = "RATE THIS DRAWING!";
                document.getElementById('star-container').style.display = 'flex';
                document.querySelectorAll('.star-btn').forEach(btn => {
                    btn.style.color = 'var(--panel-bg-hover)';
                    btn.style.pointerEvents = 'auto';
                });
            }
        });

        socket.on('show_results', top3 => {
            UI.showView('view-results');
            const p = document.getElementById('podium-container');
            p.innerHTML = '';
            
            const layout = [{ class: 'place-2', title: '2ND', data: top3[1] }, { class: 'place-1', title: '1ST', data: top3[0] }, { class: 'place-3', title: '3RD', data: top3[2] }];
            layout.forEach(pos => {
                if(pos.data) {
                    p.innerHTML += `
                    <div class="podium-place ${pos.class}">
                        <img class="podium-art" src="${pos.data.image}">
                        <div class="podium-step">
                            <span style="font-size:1.5rem; margin-bottom:5px;">${pos.data.name}</span>
                            ${pos.title}
                            <span style="font-size:1.2rem; font-weight:700;">${pos.data.score} ⭐</span>
                        </div>
                    </div>`;
                }
            });

            const duration = 10000, end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#3a86ff', '#ff006e', '#ffd166'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#3a86ff', '#ff006e', '#ffd166'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        });

        socket.on('return_to_lobby', () => { UI.showView('view-lobby'); socket.emit('toggle_ready', Game.code); socket.emit('toggle_ready', Game.code); });


        /* =========================================
           ADVANCED DRAWING ENGINE
        ========================================= */
        const DrawEngine = {
            width: 1920, height: 1080,
            layers: [], activeLayer: 0, history: [],
            tool: 'pencil', color: '#000000', size: 8, opacity: 1,
            
            // Viewport
            scale: 1, panX: 0, panY: 0, isPanning: false,
            
            // Interaction State
            isDrawing: false, lastPos: null, startPos: null, previewData: null,
            airbrushRAF: null, // Request animation frame for continuous airbrush
            
            // DOM
            workspace: document.getElementById('workspace'),
            wrap: document.getElementById('canvas-wrap'),

            init: function() {
                this.workspace.innerHTML = '';
                this.layers = []; this.history = [];
                this.workspace.style.width = this.width + 'px';
                this.workspace.style.height = this.height + 'px';
                
                this.addLayer("Background", true);
                this.fillCanvas('#ffffff');
                this.addLayer("Layer 1");

                // Center canvas visually
                const rect = this.wrap.getBoundingClientRect();
                this.scale = Math.min(rect.width / this.width, rect.height / this.height) * 0.9;
                this.panX = (rect.width - (this.width * this.scale)) / 2;
                this.panY = (rect.height - (this.height * this.scale)) / 2;
                this.updateTransform();

                this.setupEvents();
                this.updateLayerUI();
                this.saveState();
            },

            addLayer: function(name = `Layer ${this.layers.length}`, isBg = false) {
                const canvas = document.createElement('canvas');
                canvas.width = this.width; canvas.height = this.height;
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                this.workspace.appendChild(canvas);
                this.layers.push({ name, canvas, ctx, visible: true, isBg });
                this.activeLayer = this.layers.length - 1;
                this.updateLayerUI();
            },

            updateLayerUI: function() {
                const list = document.getElementById('layer-list');
                list.innerHTML = '';
                this.layers.forEach((l, i) => {
                    const el = document.createElement('div');
                    el.className = `layer-card ${i === this.activeLayer ? 'active' : ''}`;
                    el.onclick = () => { this.activeLayer = i; this.updateLayerUI(); };
                    el.innerHTML = `<span>${l.name}</span> <i class="fa-solid fa-eye${l.visible ? '' : '-slash'}" onclick="event.stopPropagation(); DrawEngine.toggleLayer(${i})"></i>`;
                    list.appendChild(el);
                });
            },

            toggleLayer: function(i) {
                this.layers[i].visible = !this.layers[i].visible;
                this.layers[i].canvas.style.display = this.layers[i].visible ? 'block' : 'none';
                this.updateLayerUI();
            },

            updateTransform: function() {
                this.workspace.style.transform = `translate(${this.panX}px, ${this.panY}px) scale(${this.scale})`;
            },
            resize: function() { if(this.workspace) this.updateTransform(); },

            getPos: function(e) {
                const rect = this.workspace.getBoundingClientRect();
                return { x: (e.clientX - rect.left) / this.scale, y: (e.clientY - rect.top) / this.scale };
            },

            setupEvents: function() {
                this.wrap.onpointerdown = this.down.bind(this);
                window.onpointermove = this.move.bind(this);
                window.onpointerup = this.up.bind(this);
                
                this.wrap.onwheel = (e) => {
                    if(Game.hasSubmitted) return;
                    e.preventDefault();
                    const delta = -e.deltaY * 0.001;
                    const oldScale = this.scale;
                    this.scale = Math.min(Math.max(0.1, this.scale + delta), 5);
                    const rect = this.wrap.getBoundingClientRect();
                    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
                    this.panX = mx - (mx - this.panX) * (this.scale / oldScale);
                    this.panY = my - (my - this.panY) * (this.scale / oldScale);
                    this.updateTransform();
                };

                window.onkeydown = (e) => {
                    if(Game.hasSubmitted || e.target.tagName === 'INPUT') return;
                    if(e.code === 'Space') { this.isPanning = true; this.wrap.style.cursor = 'grab'; }
                    if(e.ctrlKey && e.code === 'KeyZ') this.undo();
                    if(e.code === 'KeyB') this.setTool('pencil');
                    if(e.code === 'KeyE') this.setTool('eraser');
                    if(e.code === 'KeyG') this.setTool('fill');
                    if(e.code === 'KeyR') this.setTool('rect');
                    if(e.code === 'KeyC') this.setTool('circle');
                    if(e.code === 'KeyL') this.setTool('line');
                };
                window.onkeyup = (e) => {
                    if(e.code === 'Space') { this.isPanning = false; this.wrap.style.cursor = 'crosshair'; }
                };
            },

            down: function(e) {
                if(Game.hasSubmitted) return;
                if(e.button === 1 || this.isPanning || this.tool === 'pan') {
                    this.isPanning = true;
                    this.startPos = { x: e.clientX - this.panX, y: e.clientY - this.panY };
                    this.wrap.style.cursor = 'grabbing';
                    return;
                }

                const pos = this.getPos(e);
                this.isDrawing = true;
                this.startPos = pos; this.lastPos = pos;

                const layer = this.layers[this.activeLayer];
                if(!layer.visible) return;
                const ctx = layer.ctx;
                
                ctx.lineWidth = this.size;
                ctx.strokeStyle = this.color; ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.globalCompositeOperation = 'source-over'; // default

                if(this.tool === 'eraser') {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.globalAlpha = 1; // Erasers should be fully opaque typically
                } else if(this.tool === 'marker') {
                    ctx.globalCompositeOperation = 'multiply';
                    ctx.globalAlpha = this.opacity * 0.5;
                }

                if(this.tool === 'fill') {
                    this.floodFill(Math.floor(pos.x), Math.floor(pos.y));
                    this.isDrawing = false;
                    this.saveState();
                } else if(this.tool === 'airbrush') {
                    // Start continuous spray loop
                    this.continuousAirbrush();
                } else if(['rect', 'circle', 'line'].includes(this.tool)) {
                    this.previewData = ctx.getImageData(0,0, this.width, this.height);
                } else {
                    ctx.beginPath(); ctx.arc(pos.x, pos.y, this.size/2, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
                }
            },

            move: function(e) {
                if(this.isPanning) {
                    this.panX = e.clientX - this.startPos.x;
                    this.panY = e.clientY - this.startPos.y;
                    this.updateTransform();
                    return;
                }
                if(!this.isDrawing) return;
                const pos = this.getPos(e);
                this.lastPos = pos; // Update last position for airbrush

                const ctx = this.layers[this.activeLayer].ctx;

                if(['rect', 'circle', 'line'].includes(this.tool)) {
                    ctx.putImageData(this.previewData, 0, 0);
                    ctx.beginPath();
                    if(this.tool === 'rect') ctx.rect(this.startPos.x, this.startPos.y, pos.x - this.startPos.x, pos.y - this.startPos.y);
                    else if(this.tool === 'circle') {
                        const r = Math.sqrt(Math.pow(pos.x - this.startPos.x, 2) + Math.pow(pos.y - this.startPos.y, 2));
                        ctx.arc(this.startPos.x, this.startPos.y, r, 0, Math.PI*2);
                    } else if(this.tool === 'line') {
                        ctx.moveTo(this.startPos.x, this.startPos.y); ctx.lineTo(pos.x, pos.y);
                    }
                    ctx.stroke();
                } else if (this.tool !== 'airbrush') {
                    ctx.lineTo(pos.x, pos.y); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
                }
            },

            up: function(e) {
                if(this.isPanning && e.button !== 1 && this.tool !== 'pan') this.isPanning = false;
                if(!this.isDrawing) return;
                this.isDrawing = false;
                
                // Stop airbrush loop
                if (this.airbrushRAF) { cancelAnimationFrame(this.airbrushRAF); this.airbrushRAF = null; }

                const ctx = this.layers[this.activeLayer].ctx;
                if(['rect', 'circle', 'line'].includes(this.tool)) ctx.stroke();
                ctx.globalCompositeOperation = 'source-over';
                this.saveState();
            },

            // --- Real Continuous Airbrush ---
            continuousAirbrush: function() {
                if (!this.isDrawing) return;
                const ctx = this.layers[this.activeLayer].ctx;
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity * 0.1; // Very soft particles
                
                // Draw multiple particles per frame around the cursor
                for (let i = 0; i < (this.size * 2); i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = Math.random() * (this.size / 2);
                    const x = this.lastPos.x + Math.cos(angle) * radius;
                    const y = this.lastPos.y + Math.sin(angle) * radius;
                    ctx.fillRect(x, y, 1, 1);
                }
                
                this.airbrushRAF = requestAnimationFrame(() => this.continuousAirbrush());
            },

            floodFill: function(x, y) {
                const ctx = this.layers[this.activeLayer].ctx;
                const imgData = ctx.getImageData(0,0,this.width,this.height);
                const data = imgData.data;
                const getIdx = (x,y) => (y * this.width + x) * 4;
                const startIdx = getIdx(x, y);
                const [r, g, b, a] = [data[startIdx], data[startIdx+1], data[startIdx+2], data[startIdx+3]];
                
                const hex = this.tool === 'eraser' ? 'ffffff' : this.color.replace('#','');
                const [fr, fg, fb] = [parseInt(hex.substring(0,2),16), parseInt(hex.substring(2,4),16), parseInt(hex.substring(4,6),16)];

                if(r===fr && g===fg && b===fb && (a===255 || this.tool==='eraser')) return;

                const match = (i) => data[i]===r && data[i+1]===g && data[i+2]===b && data[i+3]===a;
                const set = (i) => { data[i]=fr; data[i+1]=fg; data[i+2]=fb; data[i+3]=this.tool==='eraser'?0:255; };

                const stack = [[x, y]];
                while(stack.length) {
                    let [cx, cy] = stack.pop();
                    let idx = getIdx(cx, cy);
                    while(cy >= 0 && match(idx)) { cy--; idx -= this.width*4; }
                    cy++; idx += this.width*4;
                    
                    let left = false, right = false;
                    while(cy < this.height && match(idx)) {
                        set(idx);
                        if(cx > 0) {
                            if(match(idx-4)) { if(!left) { stack.push([cx-1, cy]); left=true; } }
                            else left = false;
                        }
                        if(cx < this.width-1) {
                            if(match(idx+4)) { if(!right) { stack.push([cx+1, cy]); right=true; } }
                            else right = false;
                        }
                        cy++; idx += this.width*4;
                    }
                }
                ctx.putImageData(imgData, 0, 0);
            },

            saveState: function() {
                const state = [];
                this.layers.forEach(l => state.push(l.ctx.getImageData(0,0,this.width,this.height)));
                this.history.push(state);
                if(this.history.length > 20) this.history.shift();
            },
            undo: function() {
                if(this.history.length > 1) {
                    this.history.pop();
                    const state = this.history[this.history.length-1];
                    state.forEach((imgData, i) => this.layers[i].ctx.putImageData(imgData, 0, 0));
                }
            },
            clearCanvas: function() {
                const ctx = this.layers[this.activeLayer].ctx;
                ctx.clearRect(0,0,this.width,this.height);
                if(this.layers[this.activeLayer].isBg) this.fillCanvas('#ffffff');
                this.saveState();
            },
            fillCanvas: function(color) {
                const ctx = this.layers[this.activeLayer].ctx;
                ctx.fillStyle = color; ctx.fillRect(0,0,this.width,this.height);
            },
            
            setTool: function(t) {
                this.tool = t;
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                const btn = document.getElementById('tool-' + t);
                if(btn) btn.classList.add('active');
                this.wrap.style.cursor = t === 'pan' ? 'grab' : 'crosshair';
            },
            setColor: function(c) { 
                this.color = c; document.getElementById('color-picker').value = c; 
                document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
                if(this.tool === 'eraser') this.setTool('pencil');
            },
            updateProps: function() {
                this.size = parseInt(document.getElementById('prop-size').value);
                this.opacity = parseInt(document.getElementById('prop-opacity').value) / 100;
                this.color = document.getElementById('color-picker').value;
                document.getElementById('val-size').innerText = this.size;
                document.getElementById('val-opacity').innerText = Math.round(this.opacity*100);
            },
            getFinalImage: function() {
                const comp = document.createElement('canvas'); comp.width = this.width; comp.height = this.height;
                const ctx = comp.getContext('2d');
                ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,this.width,this.height);
                this.layers.forEach(l => { if(l.visible) ctx.drawImage(l.canvas, 0, 0); });
                
                const out = document.createElement('canvas'); out.width = 1280; out.height = 720;
                out.getContext('2d').drawImage(comp, 0, 0, 1280, 720);
                return out.toDataURL('image/jpeg', 0.85);
            }
        };

        window.addEventListener('resize', () => DrawEngine.resize());
        UI.initColors();
    </script>
</body>
